<style data-purpose="custom-glassmorphism">
    /* High-end Crystal Refraction Glassmorphism for Desktop */
    .glass-card {
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(8px) saturate(85%);
      -webkit-backdrop-filter: blur(8px) saturate(85%);
      border: 1.5px solid transparent;
      background-clip: padding-box;
      box-shadow: 
        inset 0 1px 0 0 rgba(255, 255, 255, 0.8),
        inset 0 -1px 0 0 rgba(255, 255, 255, 0.3),
        inset 1px 0 0 0 rgba(255, 255, 255, 0.6),
        inset -1px 0 0 0 rgba(255, 255, 255, 0.2),
        0 8px 32px 0 rgba(0, 0, 0, 0.1),
        0 0 0 1.5px rgba(255, 255, 255, 0.4);
      position: relative;
    }

    /* Specialized Glassmorphism for Mobile */

      background: rgba(255, 255, 255, 0.08);

      -webkit-backdrop-filter: blur(25px) saturate(85%);
      border: 1.2px solid transparent;
      background-clip: padding-box;

        0 4px 20px 0 rgba(0, 0, 0, 0.08),
        0 0 0 1px rgba(255, 255, 255, 0.3);
      position: relative;
    }
    
    .glass-card::before, .glass-card-mobile::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 40px;
      padding: 1.5px;
      background: linear-gradient(
        135deg,
        rgba(255, 255, 255, 0.6) 0%,
        rgba(255, 255, 255, 0.2) 50%,

      z-index: 1;

    /* Updated Mobile profile card - 2:3 vertical layout */

        width: 100%;

        margin: 0 auto;

      aside[data-purpose="user-profile-section"] .glass-card-mobile {
        display: grid;
        grid-template-columns: 1fr;
        grid-template-rows: auto auto auto auto auto auto;
        gap: 8px;

<script>
  const applyResources = (resources) => {
    const profilePicture = document.querySelector('[data-resource="profile-picture"]');
    if (profilePicture && resources.profilePictureLink) {
      profilePicture.src = resources.profilePictureLink;
    }

    const whatsappLink = document.querySelector('[data-resource="whatsapp-link"]');
    if (whatsappLink && resources.whatsappButtonRedirectLink) {
      whatsappLink.href = resources.whatsappButtonRedirectLink;
    }

    const emailLink = document.querySelector('[data-resource="email-link"]');
    if (emailLink && resources.emailButtonRedirectLink) {
      emailLink.href = resources.emailButtonRedirectLink;
    }

    if (resources.mobileViewBackgroundLink) {
      document.documentElement.style.setProperty('--mobile-background-image', `url('${resources.mobileViewBackgroundLink}')`);
    }

    if (resources.desktopViewBackgroundLink) {
      document.documentElement.style.setProperty('--desktop-background-image', `url('${resources.desktopViewBackgroundLink}')`);
    }

    const galleryGrid = document.getElementById('gallery-grid');
    if (galleryGrid && Array.isArray(resources.galleryImages)) {
      galleryGrid.innerHTML = '';
      
      // Keep standard order (1, 2, 3, 4) as column-count fills vertically.
      const images = resources.galleryImages
        .filter((image) => image && image.link)
        .sort((a, b) => Number(a.id) - Number(b.id));

      images.forEach((image) => {
        const item = document.createElement('div');
        item.className = 'masonry-item bg-white/40 shadow-sm';

        const img = document.createElement('img');
        img.alt = image.alt || `Gallery image ${image.id}`;
        img.className = 'gallery-image w-full block hover:scale-105 transition-transform duration-500';
        img.dataset.fullSrc = image.link;
        img.src = image.link;

        item.appendChild(img);
        galleryGrid.appendChild(item);
      });
    }
  };

  const setupLightbox = () => {
    const lightbox = document.getElementById('image-lightbox');
    const lightboxImage = document.getElementById('image-lightbox-img');
    const closeButton = document.getElementById('image-lightbox-close');

    const closeLightbox = () => {
      lightbox.classList.remove('is-open');
      lightbox.setAttribute('aria-hidden', 'true');
      lightboxImage.src = '';
      lightboxImage.alt = '';
    };

    document.addEventListener('click', (event) => {
      const image = event.target.closest('.gallery-image');
      if (image) {
        lightboxImage.src = image.dataset.fullSrc || image.src;
        lightboxImage.alt = image.alt;
        lightbox.classList.add('is-open');
        lightbox.setAttribute('aria-hidden', 'false');
      }
    });

    closeButton.addEventListener('click', closeLightbox);
    lightbox.addEventListener('click', (event) => {
      if (event.target === lightbox) {
        closeLightbox();
      }
    });
    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape' && lightbox.classList.contains('is-open')) {
        closeLightbox();
      }
    });
  };

  setupLightbox();

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/service-worker.js')
        .then((registration) => {
          console.log('Service Worker registered successfully:', registration);
          setInterval(() => {
            registration.update();
          }, 60000);
        })
        .catch((error) => {
          console.warn('Service Worker registration failed:', error);
        });

      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (refreshing) return;
        refreshing = true;
        window.location.reload();
      });
    });
  }

  fetch('resources.json')
    .then((response) => response.json())
    .then(applyResources)
    .catch((error) => {
      console.error('Unable to load resources.json', error);
    });
</script>
</body></html>
