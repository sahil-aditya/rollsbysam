  <style>

  /* --- Hero Slider Styling --- */

  /* --- REMOVED HEADING CONTAINER AND H1/H3 STYLING --- */

  /* Info icon (Disclaimer Button) - Now inside the popup */

  /* Disclaimer popup */

  /* Slider styles (for the before/after images) */
  .slider-container {
    max-width: 800px;
    margin: 40px auto;
    position: relative;
    overflow: hidden;
    border-radius: 10px;
    user-select: none;
    transform: scale(0.98);
    transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1), filter 0.8s ease, box-shadow 0.8s ease;
    filter: brightness(0.89);
    box-shadow: 0 10px 20px rgba(0, 0, 0, 0.6);
  }

  .slider-container.in-focus {
    transform: scale(1.06);
    filter: brightness(1);
    box-shadow: none;
  }

  .after-img {
    display: block;
    width: 100%;
  }
  .before-img {
    position: absolute;
    top: 0;
    left: 0;
    height: 100%;
    width: 100%;
    object-fit: cover;
    clip-path: inset(0 50% 0 0);
    transition: clip-path 0.2s ease-out;
  }
  /* IMPROVED HANDLE STYLING */
  .handle {
    position: absolute;
    top: 0;
    left: 50%;
    width: 2px;
    height: 100%;
    background: #fff;
    cursor: ew-resize;
    transform: translateX(-50%);
    z-index: 10;
  }
  .handle::before {
    content: '←'; /* The arrow itself */
    position: absolute;
    top: 50%;
    left: -25px; /* Positioned to the left of the slider line */
    transform: translateY(-50%);
    color: #fff;
    font-size: 14px;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #111; /* Background to make it stand out */
    border: 1px solid #fff; /* A subtle white border */
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s ease, background 0.2s ease;
  }
  .handle:hover::before {
    transform: translateY(-50%) scale(1.2); /* Scale up on hover */
    background: #333; /* Darker background on hover */
  }

  /* Control Buttons */
  .control-btn {
    position: fixed;

  /* NEW: Water-like animation and glass effect for menu button and volume panel */

  /* लहरदार पानी एनीमेशन */
  @keyframes wavy-water {
    0% {
      background-position: 100% 0;
    }
    100% {
      background-position: 0 0;

  }
  /* --- वॉल्यूम पैनल के लिए नया CSS --- */

  /* Contact Popup */
  #contact-popup {
    position: fixed;

  #contact-popup h3 {

    animation: water-flow 8s linear infinite;
    text-shadow: 0 0 5px rgba(255, 255, 255, 0.5), 0 0 10px rgba(255, 255, 255, 0.3);
  }
  #contact-popup p {
    margin: 4px 0 12px;

  }
  #contact-popup a {
    display: block;

    font-size: 14px;
    background: rgba(34, 34, 34, 0.7);
    color: white;
    transition: background 0.3s;
  }
  #contact-popup a:hover {
    background: rgba(51, 51, 51, 0.9);
  }

  /* New CSS for blurred placeholders */
  .blurred {
    filter: blur(15px);
    transition: filter 0.8s ease;
  }
  .loaded {
    filter: blur(0);
  }
</style>
  <script async>
    // Moved the data fetching logic to the head with 'async'
    let allImagePairs = [];
    const jsonPath = 'images.json';

    fetch(jsonPath)
      .then(response => {
        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }
        return response.json();
      })
      .then(data => {
        // Remove the first image pair to be replaced by the hero slider
        // This assumes the first pair in the JSON is the one to be replaced.
        if (data.length > 0) {
            data.shift(); 
        }

        allImagePairs = data;
        // Check if the gallery element is available before trying to load
        if (document.getElementById('gallery')) {
          loadAllBatches();
        }
      })
      .catch(error => {
        console.error('Error fetching the gallery data:', error);
      });
  </script>

<script>
  // Contact menu toggle
  const menuBtn = document.getElementById('menu-btn');
  const contactPopup = document.getElementById('contact-popup');
  const phoneLink = document.getElementById('phone-link');
  const infoIcon = document.querySelector('.info-icon');

  const phoneNumber = "";
  if (phoneNumber) {
    phoneLink.href = "tel:" + phoneNumber;
    phoneLink.style.display = "block";
  }

  menuBtn.addEventListener('click', () => {
    contactPopup.style.display = (contactPopup.style.display === "block") ? "none" : "block";
  });

  document.addEventListener('click', (e) => {
    // Check if the click is outside the popup and the menu button
    if (!contactPopup.contains(e.target) && !menuBtn.contains(e.target)) {
      contactPopup.style.display = "none";
    }
  });

  // Disclaimer toggle
  function showDisclaimer() {
    // --- New logic to close contact popup ---
    contactPopup.style.display = 'none';
    document.getElementById('disclaimer-popup').style.display = 'block';
  }
  function closeDisclaimer() {
    document.getElementById('disclaimer-popup').style.display = 'none';
  }

  // Fade buttons on scroll - ONLY MENU BUTTON REMAINS FIXED NOW
  // The Shop button and Volume Panel are inside the popup and no longer fixed/visible outside the menu.
  const volumePanel = document.getElementById('volume-panel'); // Kept for logic
  const shopBtn = document.getElementById('shop-btn'); // Kept for logic

  window.addEventListener('scroll', () => {
    if (window.scrollY > 100) {
      menuBtn.style.opacity = '0';
      // No need to hide volumePanel/shopBtn as they are in the contact-popup
    } else {
      menuBtn.style.opacity = '1';
    }
  });

  // Shop button redirect
  shopBtn.addEventListener('click', () => {
    window.location.href = "shop.html";
  });

  // --- वॉल्यूम पैनल के लिए अपडेटेड JavaScript ---
  let audio = null;
  const musicSource = "https://sahil-aditya.github.io/Creative_Gallery/images/music.mp3";
  const volumeSlider = document.getElementById('volume-slider');
  const volumeIcon = document.getElementById('volume-icon');
  let hasInteracted = false;
  let isExpanded = false;

  function initializeAudio() {
    if (!audio) {
      audio = new Audio(musicSource);
      audio.loop = true;
      audio.volume = 0;
    }
  }

  volumeSlider.addEventListener('input', () => {
    if (isExpanded) {
      const newVolume = parseFloat(volumeSlider.value);
      audio.volume = newVolume;

      if (newVolume > 0) {
        if (audio.paused) {
          audio.play();
        }
        volumeIcon.src = 'https://sahil-aditya.github.io/Creative_Gallery/images/play.png';
      } else {
        audio.pause();
        volumeIcon.src = 'https://sahil-aditya.github.io/Creative_Gallery/images/mute.png';
      }
    }
  });

  volumeIcon.addEventListener('click', () => {
    initializeAudio();

    // Toggle the expanded state of the panel
    if (!isExpanded) {
        volumePanel.classList.add('expanded');
        isExpanded = true;
    } else {
        volumePanel.classList.remove('expanded');
        isExpanded = false;
    }

    // Play/Pause logic
    if (!hasInteracted) {
      audio.volume = 0.5;
      volumeSlider.value = 0.5;
      volumeIcon.src = 'https://sahil-aditya.github.io/Creative_Gallery/images/play.png';
      audio.play();
      hasInteracted = true;
    } else {
      if (audio.volume > 0) {
        audio.volume = 0;
        volumeSlider.value = 0;
        volumeIcon.src = 'https://sahil-aditya.github.io/Creative_Gallery/images/mute.png';
        audio.pause();
      } else {
        audio.volume = 0.5;
        volumeSlider.value = 0.5;
        volumeIcon.src = 'https://sahil-aditya.github.io/Creative_Gallery/images/play.png';
        audio.play();
      }
    }
  });
  // --- वॉल्यूम पैनल के लिए अपडेटेड JavaScript ---

  // --- START: YOUR ORIGINAL BATCH LOADING AND BLUR EFFECT CODE (Unchanged) ---

  const gallery = document.getElementById("gallery");
  const batchSize = 2; // Number of sliders to load per batch
  let currentBatch = 0;

  function createSlider(pair) {
    const container = document.createElement("div");
    container.classList.add("slider-container");

    // Create and append images with blur class initially
    const afterImg = document.createElement("img");
    afterImg.src = pair.after;
    afterImg.alt = "After Image";
    afterImg.classList.add("after-img", "blurred");

    const beforeImg = document.createElement("img");
    beforeImg.src = pair.before;
    beforeImg.alt = "Before Image";
    beforeImg.classList.add("before-img", "blurred");

    container.appendChild(afterImg);
    container.appendChild(beforeImg);

    // Create and append the handle
    const handle = document.createElement("div");
    handle.classList.add("handle");
    container.appendChild(handle);

    gallery.appendChild(container);

    // Remove blur class once images are loaded
    afterImg.onload = () => afterImg.classList.remove("blurred");
    beforeImg.onload = () => beforeImg.classList.remove("blurred");

    let dragging = false;

    const move = (x) => {
      const rect = container.getBoundingClientRect();
      let offsetX = x - rect.left;
      if (offsetX < 0) offsetX = 0;
      if (offsetX > rect.width) offsetX = rect.width;
      const percent = (offsetX / rect.width) * 100;
      beforeImg.style.clipPath = `inset(0 ${100 - percent}% 0 0)`;
      handle.style.left = `${percent}%`;
    };

    handle.addEventListener("mousedown", () => dragging = true);
    window.addEventListener("mouseup", () => dragging = false);
    window.addEventListener("mousemove", e => { if (dragging) move(e.clientX); });

    handle.addEventListener("touchstart", () => dragging = true);
    window.addEventListener("touchend", () => dragging = false);
    window.addEventListener("touchmove", e => { if (dragging) move(e.touches[0].clientX); });
  }

  function loadAllBatches() {
    let startIndex = currentBatch * batchSize;
    let endIndex = startIndex + batchSize;

    // Load a batch of sliders
    for (let i = startIndex; i < endIndex && i < allImagePairs.length; i++) {
      createSlider(allImagePairs[i]);
    }

    currentBatch++;

    // If there are more batches, schedule the next one
    if (startIndex + batchSize < allImagePairs.length) {
      setTimeout(loadAllBatches, 500); // Wait 0.5 seconds before loading the next batch
    }
  }

  // --- Performance-Optimized JS for focus effect ---
  // Note: This targets .slider-container, so the hero-slider is unaffected.
  let isUpdatingFocus = false;

  function updateFocus() {
    isUpdatingFocus = false;
    const windowHeight = window.innerHeight;
    const focusZoneStart = windowHeight * 0.3;
    const focusZoneEnd = windowHeight * 0.7;

    const containers = document.querySelectorAll('.slider-container'); // Re-querying here is okay
    containers.forEach(container => {
      const rect = container.getBoundingClientRect();
      const elementCenter = rect.top + rect.height / 2;

      if (elementCenter > focusZoneStart && elementCenter < focusZoneEnd) {
        container.classList.add('in-focus');
      } else {
        container.classList.remove('in-focus');
      }
    });
  }

  window.addEventListener('scroll', () => {
    if (!isUpdatingFocus) {
      window.requestAnimationFrame(updateFocus);
      isUpdatingFocus = true;
    }
  });

  // Run on page load to set initial focus
  window.addEventListener('load', updateFocus);

  // --- END: MODIFIED CODE FOR BATCH LOADING AND BLUR EFFECT ---
</script>
