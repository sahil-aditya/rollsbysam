<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Website Name -->
    <title>rollsbysam</title>
    
    <!-- Aggressive Caching Meta Tags -->
    <meta http-equiv="Cache-Control" content="max-age=31536000, public">
    <meta http-equiv="Pragma" content="cache">
    <meta http-equiv="Expires" content="31536000">
    
    <!-- Meta Tags for SEO and Social Media Previews -->
    <meta name="description" content="Portfolio of rollsbysam - Visual Artist and Colorist">
    <meta property="og:title" content="rollsbysam">
    <meta property="og:description" content="Visual Artist and Colorist Portfolio">
    <meta property="og:image" content="<!-- INSERT THUMBNAIL LINK HERE -->">
    <meta property="og:url" content="https://sahil-aditya.github.io/Creative_Gallery/">
    <meta name="twitter:card" content="summary_large_image">
    
    <!-- Favicon / Icon -->
    <link rel="icon" href="<!-- INSERT ICON LINK HERE -->" type="image/x-icon">

    <style>
        /* Removes default browser margins and sets the matte black base */
        html, body {
            margin: 0;
            padding: 0;
            background-color: #141414;
            overflow-x: hidden; /* Strictly prevents any horizontal scrolling */
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        /* Custom Modern Sleek Tiny Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #141414;
        }
        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
        /* Firefox */
        * {
            scrollbar-width: thin;
            scrollbar-color: #333 #141414;
        }

        /* Container to clip the Canva footer buttons */
        .canva-container {
            position: relative;
            width: 100vw;
            height: 281.1127vw; /* Adjust height based on your design's ratio */
            overflow: hidden;
            /* Force hardware acceleration for smoother scrolling */
            transform: translateZ(0);
            will-change: transform;
            padding-bottom: 100px; /* Space for bottom navigation bar */
        }

        /* 
           Hiding Canva Buttons:
           Canva embeds usually have a fixed footer at the bottom. 
           We use a container with 'overflow: hidden' and make the iframe 
           slightly taller or shift it to hide the bottom control bar.
        */
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: calc(100% + 40px); /* Making it slightly taller to push buttons out of view */
            border: none;
            display: block;
        }

        /* Glass UI Bottom Navigation Bar */
        .bottom-nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            gap: 12px;
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        /* Navigation Tab */
        .nav-tab {
            padding: 10px 20px;
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border-radius: 30px;
            transition: all 0.3s ease;
            position: relative;
            white-space: nowrap;
            letter-spacing: 0.5px;
        }

        /* Tab hover effect */
        .nav-tab:hover {
            color: rgba(255, 255, 255, 0.9);
            background: rgba(255, 255, 255, 0.1);
        }

        /* Active tab */
        .nav-tab.active {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.2);
            box-shadow: inset 0 2px 8px rgba(255, 255, 255, 0.2);
        }

        /* Thin shiny white border effect on active tab */
        .nav-tab.active::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.8), transparent);
            border-radius: 30px;
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .bottom-nav {
                bottom: 16px;
                padding: 10px 16px;
                gap: 8px;
            }

            .nav-tab {
                padding: 8px 16px;
                font-size: 13px;
            }
        }

        @media (max-width: 480px) {
            .bottom-nav {
                bottom: 12px;
                padding: 8px 12px;
                gap: 6px;
            }

            .nav-tab {
                padding: 6px 12px;
                font-size: 12px;
            }
        }

        /* Prevent text selection on buttons */
        .nav-tab {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        /* Disable default touch behaviors */
        body {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Page Container */
        .page-container {
            width: 100vw;
            height: 100vh;
            overflow-y: auto;
            position: relative;
        }

        .page-container.hidden {
            display: none;
        }
    </style>
</head>
<body>

    <!-- HOME PAGE -->
    <div id="home-page" class="page-container">
        <div class="canva-container">
            <iframe loading="lazy" 
                src="https://www.canva.com/design/DAHNmGrziE8/LSRHJCe9RaZ0mD-ykex5bQ/view?embed" 
                allowfullscreen="allowfullscreen" 
                allow="fullscreen">
            </iframe>
        </div>
    </div>

    <!-- ABOUT ME PAGE -->
    <div id="about-page" class="page-container hidden">
        <div class="canva-container">
            <!-- EMBED LINK 2: PASTE YOUR ABOUT ME CANVA EMBED LINK HERE -->
            <iframe loading="lazy" 
                src="" 
                allowfullscreen="allowfullscreen" 
                allow="fullscreen">
            </iframe>
        </div>
    </div>

    <!-- BOOK/HIRE PAGE -->
    <div id="book-page" class="page-container hidden">
        <div class="canva-container">
            <!-- EMBED LINK 3: PASTE YOUR BOOK/HIRE CANVA EMBED LINK HERE -->
            <iframe loading="lazy" 
                src="" 
                allowfullscreen="allowfullscreen" 
                allow="fullscreen">
            </iframe>
        </div>
    </div>

    <!-- GLASS UI BOTTOM NAVIGATION BAR -->
    <div class="bottom-nav">
        <div class="nav-tab active" data-page="home">Home</div>
        <div class="nav-tab" data-page="about">About me</div>
        <div class="nav-tab" data-page="book">Book/Hire</div>
    </div>

    <script>
        // ===== PAGE NAVIGATION LOGIC =====
        const navTabs = document.querySelectorAll('.nav-tab');
        const pages = {
            home: document.getElementById('home-page'),
            about: document.getElementById('about-page'),
            book: document.getElementById('book-page')
        };

        navTabs.forEach(tab => {
            tab.addEventListener('click', () => {
                const pageKey = tab.getAttribute('data-page');
                
                // Remove active class from all tabs
                navTabs.forEach(t => t.classList.remove('active'));
                
                // Add active class to clicked tab
                tab.classList.add('active');
                
                // Hide all pages
                Object.values(pages).forEach(page => {
                    page.classList.add('hidden');
                });
                
                // Show selected page
                pages[pageKey].classList.remove('hidden');
                
                // Scroll to top of page
                window.scrollTo(0, 0);
            });
        });

        // Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker registered'))
                    .catch(err => console.log('Service Worker registration failed', err));
            });
        }
    </script>
</body>
</html>
