  body {

  /* --- Hero Slider Styling --- */

  /* Disclaimer popup */
  .popup {

  /* Slider styles (for the before/after images) */
  .slider-container {
    max-width: 800px;
    margin: 40px auto;
    position: relative;
    overflow: hidden;
    border-radius: 10px;
    user-select: none;
    transform: scale(0.98);

    filter: brightness(0.89);

  .slider-container.in-focus {
    transform: scale(1.06);
    filter: brightness(1);
    box-shadow: none;
  }

  .after-img {
    display: block;
    width: 100%;
  }
  .before-img {
    position: absolute;
    top: 0;
    left: 0;
    height: 100%;
    width: 100%;
    object-fit: cover;
    clip-path: inset(0 50% 0 0);

  /* IMPROVED HANDLE STYLING */
  .handle {
    position: absolute;
    top: 0;
    left: 50%;

    content: '←';

  /* NEW: Water-like animation and glass effect for menu button and panel */

  /* Contact Popup */
  #contact-popup {

    border-radius: 10px;

    backdrop-filter: blur(15px);

  #contact-popup h3 {
    margin: 0;

    text-shadow: 0 0 5px rgba(255, 255, 255, 0.5), 0 0 10px rgba(255, 255, 255, 0.3);
  }
  #contact-popup p {
    margin: 4px 0 12px;

  }
  #contact-popup a {
    display: block;
    padding: 10px;

    border-radius: 6px;
    text-decoration: none;
    font-size: 14px;
    background: rgba(34, 34, 34, 0.7);
    color: white;
    transition: background 0.3s;
  }
  #contact-popup a:hover {
    background: rgba(51, 51, 51, 0.9);
  }

  /* New CSS for blurred placeholders */
  .blurred {
    filter: blur(15px);
    transition: filter 0.8s ease;
  }
  .loaded {
    filter: blur(0);
  }
</style>
  <script async>
    // --- START: MODIFIED DATA FETCH & BATCHING LOGIC ---
    let allImagePairs = [];
    const jsonPath = 'images.json';
    const batchSize = 2; // Number of sliders to load per batch
    let currentImageIndex = 0;
    let observer = null;

    fetch(jsonPath)
      .then(response => {
        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }
        return response.json();
      })
      .then(data => {
        // Remove the first image pair for the hero slider.
        if (data.length > 0) {
            data.shift(); 
        }

        allImagePairs = data;
        
        if (document.getElementById('gallery')) {
          // Start the initial batch load
          loadNextBatch();
          // Initialize the Intersection Observer for subsequent batches
          setupIntersectionObserver();
        }
      })
      .catch(error => {
        console.error('Error fetching the gallery data:', error);
      });
    // --- END: MODIFIED DATA FETCH & BATCHING LOGIC ---
  </script>

    <img src="https://sahil-aditya.github.io/Creative_Gallery/images/slide3.png" alt="Creative Slide 3">

<div id="loading-sentinel" style="height: 1px;"></div>

<script>
  // Contact menu toggle
  const menuBtn = document.getElementById('menu-btn');
  const contactPopup = document.getElementById('contact-popup');
  const phoneLink = document.getElementById('phone-link');

  const phoneNumber = "";
  if (phoneNumber) {
    phoneLink.href = "tel:" + phoneNumber;
    phoneLink.style.display = "block";
  }

  menuBtn.addEventListener('click', () => {
    contactPopup.style.display = (contactPopup.style.display === "flex") ? "none" : "flex";
  });

  document.addEventListener('click', (e) => {
    // Check if the click is outside the popup and the menu button
    if (contactPopup.style.display === "flex" && !contactPopup.contains(e.target) && !menuBtn.contains(e.target)) {
      contactPopup.style.display = "none";
    }
  });

  // Disclaimer toggle
  function showDisclaimer() {
    contactPopup.style.display = 'none';
    document.getElementById('disclaimer-popup').style.display = 'block';
  }
  function closeDisclaimer() {
    document.getElementById('disclaimer-popup').style.display = 'none';
  }

  // Fade menu button on scroll 
  window.addEventListener('scroll', () => {
    if (window.scrollY > 100) {
      menuBtn.style.opacity = '0';
    } else {
      menuBtn.style.opacity = '1';
    }
  });

  // Shop button redirect
  const shopBtn = document.getElementById('shop-btn');
  shopBtn.addEventListener('click', () => {
    window.location.href = "shop.html";
  });

  // --- Volume Panel JS (Unchanged Logic) ---
  let audio = null;
  const musicSource = "https://sahil-aditya.github.io/Creative_Gallery/images/music.mp3";
  const volumeSlider = document.getElementById('volume-slider');
  const volumeIcon = document.getElementById('volume-icon');
  let hasInteracted = false;
  let isExpanded = false;

  function initializeAudio() {
    if (!audio) {
      audio = new Audio(musicSource);
      audio.loop = true;
      audio.volume = 0;
    }
  }

  volumeSlider.addEventListener('input', () => {
    if (isExpanded) {
      const newVolume = parseFloat(volumeSlider.value);
      audio.volume = newVolume;

      if (newVolume > 0) {
        if (audio.paused) {
          audio.play();
        }
        volumeIcon.src = 'https://sahil-aditya.github.io/Creative_Gallery/images/play.png';
      } else {
        audio.pause();
        volumeIcon.src = 'https://sahil-aditya.github.io/Creative_Gallery/images/mute.png';
      }
    }
  });

  volumeIcon.addEventListener('click', () => {
    initializeAudio();

    // Toggle the expanded state of the panel
    if (!isExpanded) {
        volumePanel.classList.add('expanded');
        isExpanded = true;
    } else {
        volumePanel.classList.remove('expanded');
        isExpanded = false;
    }

    // Play/Pause logic
    if (!hasInteracted) {
      audio.volume = 0.5;
      volumeSlider.value = 0.5;
      volumeIcon.src = 'https://sahil-aditya.github.io/Creative_Gallery/images/play.png';
      audio.play();
      hasInteracted = true;
    } else {
      if (audio.volume > 0) {
        audio.volume = 0;
        volumeSlider.value = 0;
        volumeIcon.src = 'https://sahil-aditya.github.io/Creative_Gallery/images/mute.png';
        audio.pause();
      } else {
        audio.volume = 0.5;
        volumeSlider.value = 0.5;
        volumeIcon.src = 'https://sahil-aditya.github.io/Creative_Gallery/images/play.png';
        audio.play();
      }
    }
  });
  // --- Volume Panel JS End ---


  // --- START: UPGRADED BATCH LOADING WITH INTERSECTION OBSERVER ---

  const gallery = document.getElementById("gallery");
  const loadingSentinel = document.getElementById("loading-sentinel");

  function createSlider(pair) {
    const container = document.createElement("div");
    container.classList.add("slider-container");

    const afterImg = document.createElement("img");
    afterImg.src = pair.after;
    afterImg.alt = "After Image";
    afterImg.classList.add("after-img", "blurred");

    const beforeImg = document.createElement("img");
    beforeImg.src = pair.before;
    beforeImg.alt = "Before Image";
    beforeImg.classList.add("before-img", "blurred");

    container.appendChild(afterImg);
    container.appendChild(beforeImg);

    const handle = document.createElement("div");
    handle.classList.add("handle");
    container.appendChild(handle);

    gallery.appendChild(container);

    afterImg.onload = () => afterImg.classList.remove("blurred");
    beforeImg.onload = () => beforeImg.classList.remove("blurred");

    let dragging = false;

    const move = (x) => {
      const rect = container.getBoundingClientRect();
      let offsetX = x - rect.left;
      if (offsetX < 0) offsetX = 0;
      if (offsetX > rect.width) offsetX = rect.width;
      const percent = (offsetX / rect.width) * 100;
      beforeImg.style.clipPath = `inset(0 ${100 - percent}% 0 0)`;
      handle.style.left = `${percent}%`;
    };

    handle.addEventListener("mousedown", () => dragging = true);
    window.addEventListener("mouseup", () => dragging = false);
    window.addEventListener("mousemove", e => { if (dragging) move(e.clientX); });

    handle.addEventListener("touchstart", () => dragging = true);
    window.addEventListener("touchend", () => dragging = false);
    window.addEventListener("touchmove", e => { if (dragging) move(e.touches[0].clientX); });
  }

  function loadNextBatch() {
    if (currentImageIndex >= allImagePairs.length) {
      if (observer) {
        observer.unobserve(loadingSentinel); // Stop observing when all are loaded
      }
      return;
    }

    const startIndex = currentImageIndex;
    const endIndex = Math.min(startIndex + batchSize, allImagePairs.length);

    for (let i = startIndex; i < endIndex; i++) {
      createSlider(allImagePairs[i]);
    }

    currentImageIndex = endIndex;
    
    // Re-position the sentinel after the new batch
    if (currentImageIndex < allImagePairs.length) {
        gallery.insertAdjacentElement('afterend', loadingSentinel);
    } else {
        loadingSentinel.remove(); // Remove sentinel if everything is loaded
    }
  }

  function setupIntersectionObserver() {
    observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        // If the sentinel is visible (in the viewport), load the next batch
        if (entry.isIntersecting) {
          loadNextBatch();
        }
      });
    }, {
      rootMargin: '200px 0px', // Start loading when 200px away from the bottom
      threshold: 0.1
    });

    observer.observe(loadingSentinel);
  }

  // --- Performance-Optimized JS for focus effect (Unchanged) ---
  let isUpdatingFocus = false;

  function updateFocus() {
    isUpdatingFocus = false;
    const windowHeight = window.innerHeight;
    const focusZoneStart = windowHeight * 0.3;
    const focusZoneEnd = windowHeight * 0.7;

    const containers = document.querySelectorAll('.slider-container');
    containers.forEach(container => {
      const rect = container.getBoundingClientRect();
      const elementCenter = rect.top + rect.height / 2;

      if (elementCenter > focusZoneStart && elementCenter < focusZoneEnd) {
        container.classList.add('in-focus');
      } else {
        container.classList.remove('in-focus');
      }
    });
  }

  window.addEventListener('scroll', () => {
    if (!isUpdatingFocus) {
      window.requestAnimationFrame(updateFocus);
      isUpdatingFocus = true;
    }
  });

  window.addEventListener('load', updateFocus);
  // --- END: UPGRADED BATCH LOADING WITH INTERSECTION OBSERVER ---
</script>
