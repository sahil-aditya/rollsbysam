<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <style>
        /* Removes default browser margins and sets the matte black base */
        html, body {
            margin: 0;
            padding: 0;
            background-color: #141414;
            overflow-x: hidden; /* Strictly prevents any horizontal scrolling */
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        /* Custom Modern Sleek Tiny Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #141414;
        }
        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
        /* Firefox */
        * {
            scrollbar-width: thin;
            scrollbar-color: #333 #141414;
        }

        /* Container to control the exact aspect ratio per page */
        .canva-wrapper {
            position: relative;
            width: 100vw;
            overflow: hidden;
            /* Force hardware acceleration for smoother scrolling */
            transform: translateZ(0);
            will-change: transform;
            background-color: #141414;
            /* Safe default aspect ratio - will be overridden by JS */
            aspect-ratio: 1366 / 2753;
        }

        /* Hiding Canva Buttons:
           We make the iframe significantly taller (+120px) so the bottom 
           control bar gets pushed completely outside the hidden overflow of the wrapper.
           We also use clip-path as a backup to ensure no buttons are visible.
        */
        .canva-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: calc(100% + 120px); /* Pushes the Canva footer completely out of view */
            border: none;
            display: block;
            /* Backup: clip-path to ensure buttons stay hidden */
            clip-path: inset(0 0 120px 0);
        }

        /* Spacer so your bottom glass UI nav doesn't cover up the bottom of your designs */
        .nav-spacer {
            width: 100%;
            height: 100px;
        }

        /* Glass UI Bottom Navigation Bar */
        .bottom-nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            gap: 12px;
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        /* Navigation Tab */
        .nav-tab {
            padding: 10px 20px;
            background: transparent;
            border: none;
            color: rgba(0, 0, 0, 0.7);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border-radius: 30px;
            transition: all 0.3s ease;
            position: relative;
            white-space: nowrap;
            letter-spacing: 0.5px;
        }

        /* Tab hover effect */
        .nav-tab:hover {
            color: rgba(0, 0, 0, 0.9);
            background: rgba(255, 255, 255, 0.1);
        }

        /* Active tab */
        .nav-tab.active {
            color: #ffffff;
            background: rgba(0, 0, 0, 0.2);
            box-shadow: inset 0 2px 8px rgba(255, 255, 255, 0.2);
        }

        /* Thin shiny white border effect on active tab */
        .nav-tab.active::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.8), transparent);
            border-radius: 30px;
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .bottom-nav {
                bottom: 16px;
                padding: 10px 16px;
                gap: 8px;
            }

            .nav-tab {
                padding: 8px 16px;
                font-size: 13px;
            }
        }

        @media (max-width: 480px) {
            .bottom-nav {
                bottom: 12px;
                padding: 8px 12px;
                gap: 6px;
            }

            .nav-tab {
                padding: 6px 12px;
                font-size: 12px;
            }
        }

        /* Prevent text selection on buttons */
        .nav-tab {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        /* Disable default touch behaviors */
        body {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Page Container */
        .page-container {
            width: 100vw;
            min-height: 100vh;
            overflow-y: auto;
            position: relative;
        }

        .page-container.hidden {
            display: none;
        }
    </style>
</head>
<body>

    <!-- HOME PAGE -->
    <div id="home-page" class="page-container">
        <div class="canva-wrapper" data-canva-id="home">
            <iframe loading="lazy" 
                src="https://www.canva.com/design/DAHNmGrziE8/LSRHJCe9RaZ0mD-ykex5bQ/view?embed" 
                allowfullscreen="allowfullscreen" 
                allow="fullscreen">
            </iframe>
        </div>
        <div class="nav-spacer"></div>
    </div>

    <!-- ABOUT ME PAGE -->
    <div id="about-page" class="page-container hidden">
        <div class="canva-wrapper" data-canva-id="about">
            <!-- EMBED LINK 2: PASTE YOUR ABOUT ME CANVA EMBED LINK HERE -->
            <iframe loading="lazy" 
                src="" 
                allowfullscreen="allowfullscreen" 
                allow="fullscreen">
            </iframe>
        </div>
        <div class="nav-spacer"></div>
    </div>

    <!-- BOOK/HIRE PAGE -->
    <div id="book-page" class="page-container hidden">
        <div class="canva-wrapper" data-canva-id="book">
            <!-- EMBED LINK 3: PASTE YOUR BOOK/HIRE CANVA EMBED LINK HERE -->
            <iframe loading="lazy" 
                src="" 
                allowfullscreen="allowfullscreen" 
                allow="fullscreen">
            </iframe>
        </div>
        <div class="nav-spacer"></div>
    </div>

    <!-- GLASS UI BOTTOM NAVIGATION BAR -->
    <div class="bottom-nav">
        <div class="nav-tab active" data-page="home">Home</div>
        <div class="nav-tab" data-page="about">About me</div>
        <div class="nav-tab" data-page="book">Book/Hire</div>
    </div>

    <script>
        // ===== CANVA DIMENSION DETECTION VIA MESSAGE EVENTS =====
        const canvaDimensions = {
            home: { width: 1366, height: 2753 },  // Default fallback
            about: { width: 1366, height: 2753 }, // Default fallback
            book: { width: 1366, height: 2753 }   // Default fallback
        };

        // Listen for messages from Canva iframes
        window.addEventListener('message', (event) => {
            // Canva sends dimension data via postMessage
            if (event.data && event.data.type === 'CANVAS_READY') {
                const canvaId = event.data.canvaId;
                if (canvaId && event.data.width && event.data.height) {
                    canvaDimensions[canvaId] = {
                        width: event.data.width,
                        height: event.data.height
                    };
                    updateWrapperAspectRatio(canvaId);
                }
            }
        });

        // Function to update wrapper aspect ratio
        function updateWrapperAspectRatio(canvaId) {
            const wrapper = document.querySelector(`[data-canva-id="${canvaId}"]`);
            if (wrapper && canvaDimensions[canvaId]) {
                const { width, height } = canvaDimensions[canvaId];
                wrapper.style.aspectRatio = `${width} / ${height}`;
                console.log(`Updated ${canvaId} aspect ratio to ${width}/${height}`);
            }
        }

        // Alternative: Use ResizeObserver to detect iframe size changes
        function setupResizeObserver() {
            const wrappers = document.querySelectorAll('.canva-wrapper');
            
            wrappers.forEach(wrapper => {
                const iframe = wrapper.querySelector('iframe');
                const canvaId = wrapper.getAttribute('data-canva-id');
                
                if (!iframe) return;

                // Try to detect size after iframe loads
                iframe.addEventListener('load', () => {
                    setTimeout(() => {
                        try {
                            // Attempt to get iframe dimensions
                            const rect = iframe.getBoundingClientRect();
                            if (rect.width > 0 && rect.height > 0) {
                                canvaDimensions[canvaId] = {
                                    width: rect.width,
                                    height: rect.height
                                };
                                updateWrapperAspectRatio(canvaId);
                            }
                        } catch (e) {
                            console.log(`Could not detect ${canvaId} dimensions:`, e.message);
                        }
                    }, 500);
                });
            });
        }

        // ===== PAGE NAVIGATION LOGIC =====
        const navTabs = document.querySelectorAll('.nav-tab');
        const pages = {
            home: document.getElementById('home-page'),
            about: document.getElementById('about-page'),
            book: document.getElementById('book-page')
        };

        navTabs.forEach(tab => {
            tab.addEventListener('click', () => {
                const pageKey = tab.getAttribute('data-page');
                
                // Remove active class from all tabs
                navTabs.forEach(t => t.classList.remove('active'));
                
                // Add active class to clicked tab
                tab.classList.add('active');
                
                // Hide all pages
                Object.values(pages).forEach(page => {
                    page.classList.add('hidden');
                });
                
                // Show selected page
                pages[pageKey].classList.remove('hidden');
                
                // Scroll to top of page
                window.scrollTo(0, 0);
            });
        });

        // Initialize on page load
        window.addEventListener('load', () => {
            setupResizeObserver();
            // Initialize all wrappers with default aspect ratios
            Object.keys(canvaDimensions).forEach(canvaId => {
                updateWrapperAspectRatio(canvaId);
            });
        });

        // Also run on DOMContentLoaded as backup
        document.addEventListener('DOMContentLoaded', () => {
            setupResizeObserver();
        });

        // Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker registered'))
                    .catch(err => console.log('Service Worker registration failed', err));
            });
        }
    </script>
</body>
</html>
