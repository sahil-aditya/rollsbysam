<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Website Name -->
    <title>rollsbysam</title>
    
    <!-- Aggressive Caching Meta Tags -->
    <meta http-equiv="Cache-Control" content="max-age=31536000, public">
    <meta http-equiv="Pragma" content="cache">
    <meta http-equiv="Expires" content="31536000">
    
    <!-- Meta Tags for SEO and Social Media Previews -->
    <meta name="description" content="Portfolio of rollsbysam - Visual Artist and Colorist">
    <meta property="og:title" content="rollsbysam">
    <meta property="og:description" content="Visual Artist and Colorist Portfolio">
    <meta property="og:image" content="<!-- INSERT THUMBNAIL LINK HERE -->">
    <meta property="og:url" content="https://sahil-aditya.github.io/Creative_Gallery/">
    <meta name="twitter:card" content="summary_large_image">
    
    <!-- Favicon / Icon -->
    <link rel="icon" href="<!-- INSERT ICON LINK HERE -->" type="image/x-icon">

    <style>
        /* Removes default browser margins and sets the matte black base */
        html, body {
            margin: 0;
            padding: 0;
            background-color: #141414;
            overflow-x: hidden; /* Strictly prevents any horizontal scrolling */
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        /* Custom Modern Sleek Tiny Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #141414;
        }
        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
        /* Firefox */
        * {
            scrollbar-width: thin;
            scrollbar-color: #333 #141414;
        }

        /* Container to clip the Canva footer buttons */
        .canva-container {
            position: relative;
            width: 100vw;
            height: 281.1127vw; /* Adjust height based on your design's ratio */
            overflow: hidden;
            /* Force hardware acceleration for smoother scrolling */
            transform: translateZ(0);
            will-change: transform;
        }

        /* 
           Hiding Canva Buttons:
           Canva embeds usually have a fixed footer at the bottom. 
           We use a container with 'overflow: hidden' and make the iframe 
           slightly taller or shift it to hide the bottom control bar.
        */
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: calc(100% + 40px); /* Making it slightly taller to push buttons out of view */
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <div class="canva-container">
        <iframe loading="lazy" 
            src="https://www.canva.com/design/DAHNmGrziE8/LSRHJCe9RaZ0mD-ykex5bQ/view?embed" 
            allowfullscreen="allowfullscreen" 
            allow="fullscreen">
        </iframe>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker registered'))
                    .catch(err => console.log('Service Worker registration failed', err));
            });
        }
    </script>
</body>
</html>
