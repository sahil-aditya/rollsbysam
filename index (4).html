  <style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0a0f;
    color: #e8e8e8;
    font-family: 'Inter', Arial, sans-serif;
    margin: 0;
    padding: 0;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===== AMBIENT BACKGROUND ===== */
  .ambient-bg {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    z-index: -1;
    overflow: hidden;
    pointer-events: none;
  }
  .ambient-bg .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(100px);
    opacity: 0.15;
    animation: floatOrb 20s ease-in-out infinite;
  }
  .ambient-bg .orb:nth-child(1) {
    width: 600px; height: 600px;
    background: radial-gradient(circle, #6b4c9a, transparent 70%);
    top: -10%; left: -10%;
    animation-delay: 0s;
  }
  .ambient-bg .orb:nth-child(2) {
    width: 500px; height: 500px;
    background: radial-gradient(circle, #2d5a7b, transparent 70%);
    top: 40%; right: -15%;
    animation-delay: -7s;
    animation-duration: 25s;
  }
  .ambient-bg .orb:nth-child(3) {
    width: 400px; height: 400px;
    background: radial-gradient(circle, #8b5e3c, transparent 70%);
    bottom: -10%; left: 30%;
    animation-delay: -14s;
    animation-duration: 22s;
  }
  @keyframes floatOrb {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(30px, -40px) scale(1.1); }
    66% { transform: translate(-20px, 20px) scale(0.95); }
  }

  /* ===== GLASSMORPHISM UTILITIES ===== */
  .glass {
    background: rgba(255, 255, 255, 0.04);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 20px;
    box-shadow: 
      0 8px 32px rgba(0, 0, 0, 0.3),
      inset 0 1px 0 rgba(255, 255, 255, 0.05);
    transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  .glass:hover {
    background: rgba(255, 255, 255, 0.07);
    border-color: rgba(255, 255, 255, 0.15);
    box-shadow: 
      0 12px 40px rgba(0, 0, 0, 0.4),
      inset 0 1px 0 rgba(255, 255, 255, 0.08);
  }

  /* ===== HERO SLIDER ===== */
  .hero-section {
    padding: 40px 20px 20px;
    max-width: 1200px;
    margin: 0 auto;
  }
  .hero-header {
    text-align: center;
    margin-bottom: 30px;
  }
  .hero-header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 600;
    background: linear-gradient(135deg, #e8e8e8 0%, #a0a0a0 50%, #e8e8e8 100%);
    background-size: 200% 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 6s ease-in-out infinite;
    letter-spacing: -0.02em;
  }
  .hero-header p {
    font-size: 0.95rem;
    color: rgba(255,255,255,0.4);
    margin-top: 8px;
    font-weight: 300;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  @keyframes shimmer {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  .hero-slider {
    max-width: 1000px;
    margin: 0 auto 40px auto;
    overflow-x: auto;
    white-space: nowrap;
    padding: 0;
    border-radius: 20px;
    scrollbar-width: none;
    -ms-overflow-style: none;
    scroll-snap-type: x mandatory;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    border: 1px solid rgba(255,255,255,0.06);
  }
  .hero-slider::-webkit-scrollbar { display: none; }

  .hero-slider img {
    width: 100%;
    height: auto;
    display: inline-block;
    scroll-snap-align: center;
    object-fit: cover;
    max-height: 70vh;
    border-radius: 20px;
  }

  /* ===== MASONRY / PINTEREST LAYOUT ===== */
  #gallery {
    column-count: 2;
    column-gap: 20px;
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px;
  }
  @media (max-width: 600px) {
    #gallery { column-count: 1; column-gap: 16px; padding: 16px; }
  }
  @media (min-width: 1024px) {
    #gallery { column-count: 3; column-gap: 24px; padding: 24px; }
  }

  /* ===== PREMIUM SLIDER CARD ===== */
  .slider-card {
    break-inside: avoid;
    position: relative;
    overflow: hidden;
    border-radius: 20px;
    user-select: none;
    transform: scale(0.97);
    transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1), 
                filter 0.6s ease,
                box-shadow 0.6s ease;
    filter: brightness(0.85) saturate(0.9);
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    border: 1px solid rgba(255,255,255,0.04);
    background: rgba(255,255,255,0.02);
    margin-bottom: 20px;
    width: 100%;
  }
  .slider-card.in-focus {
    transform: scale(1.02);
    filter: brightness(1) saturate(1);
    box-shadow: 
      0 20px 50px rgba(0, 0, 0, 0.5),
      0 0 0 1px rgba(255,255,255,0.08);
    border-color: rgba(255,255,255,0.12);
    z-index: 10;
  }

  /* Card top bar with label */
  .card-label-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 20;
    padding: 14px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: linear-gradient(to bottom, rgba(0,0,0,0.5) 0%, transparent 100%);
    opacity: 0;
    transition: opacity 0.4s ease;
    pointer-events: none;
  }
  .slider-card:hover .card-label-bar,
  .slider-card.in-focus .card-label-bar {
    opacity: 1;
  }
  .card-label-bar .label-text {
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.7);
    text-shadow: 0 1px 3px rgba(0,0,0,0.5);
  }
  .card-label-bar .label-badge {
    font-size: 0.65rem;
    padding: 4px 10px;
    border-radius: 20px;
    background: rgba(192, 171, 225, 0.2);
    border: 1px solid rgba(192, 171, 225, 0.3);
    color: #c0abe1;
    font-weight: 600;
    letter-spacing: 0.05em;
    backdrop-filter: blur(8px);
  }

  /* Slider images - preserve original ratio, no cropping */
  .after-img {
    display: block;
    width: 100%;
    height: auto;
    border-radius: 20px;
  }
  .before-img {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    clip-path: inset(0 50% 0 0);
    transition: clip-path 0.2s ease-out;
    border-radius: 20px;
  }

  /* Premium handle */
  .handle {
    position: absolute;
    top: 0; left: 50%;
    width: 3px;
    height: 100%;
    background: linear-gradient(to bottom, 
      transparent 0%, 
      rgba(255,255,255,0.9) 15%, 
      rgba(255,255,255,0.9) 85%, 
      transparent 100%);
    cursor: ew-resize;
    transform: translateX(-50%);
    z-index: 10;
    box-shadow: 0 0 20px rgba(255,255,255,0.2);
  }
  .handle::before {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 36px; height: 36px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 2px solid rgba(255,255,255,0.5);
    box-shadow: 0 4px 20px rgba(0,0,0,0.3), 0 0 0 4px rgba(255,255,255,0.05);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
  }
  .handle::after {
    content: '◀ ▶';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: rgba(255,255,255,0.9);
    font-size: 8px;
    letter-spacing: 2px;
    font-weight: 700;
    pointer-events: none;
    z-index: 11;
    text-shadow: 0 1px 4px rgba(0,0,0,0.5);
  }
  .slider-card:hover .handle::before {
    background: rgba(255,255,255,0.25);
    border-color: rgba(255,255,255,0.8);
    transform: translate(-50%, -50%) scale(1.1);
    box-shadow: 0 6px 25px rgba(0,0,0,0.4), 0 0 0 4px rgba(255,255,255,0.1);
  }

  /* Card footer - only index number, no "Color Graded" text */
  .card-footer {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    z-index: 20;
    padding: 14px 18px;
    display: flex;
    justify-content: flex-end;
    align-items: center;
    background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 100%);
    opacity: 0;
    transition: opacity 0.4s ease;
    pointer-events: none;
  }
  .slider-card:hover .card-footer,
  .slider-card.in-focus .card-footer {
    opacity: 1;
  }
  .card-footer .card-index {
    font-size: 0.7rem;
    color: rgba(255,255,255,0.4);
    font-weight: 400;
    letter-spacing: 0.05em;
  }

  /* Blur loading state */
  .blurred {
    filter: blur(20px) brightness(0.5);
    transition: filter 0.8s ease;
  }

  /* ===== MENU BUTTON ===== */
  #menu-btn {
    position: fixed;
    top: 20px; left: 20px;
    z-index: 9999;
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 14px;
    padding: 12px 14px;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
  }
  #menu-btn:hover {
    background: rgba(255, 255, 255, 0.1);
    border-color: rgba(255, 255, 255, 0.2);
    transform: scale(1.05);
    box-shadow: 0 6px 25px rgba(0, 0, 0, 0.4);
  }
  #menu-btn div {
    width: 18px;
    height: 2px;
    background: rgba(255,255,255,0.7);
    margin: 4px 0;
    border-radius: 2px;
    transition: all 0.3s ease;
  }
  #menu-btn:hover div { background: rgba(255,255,255,0.95); }

  /* ===== CONTACT POPUP (GLASS) ===== */
  #contact-popup {
    position: fixed;
    top: 70px;
    left: 20px;
    width: 280px;
    padding: 24px;
    z-index: 10000;
    display: none;
    background: rgba(20, 20, 30, 0.7);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    text-align: center;
    animation: popupIn 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  @keyframes popupIn {
    from { opacity: 0; transform: translateY(-10px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  #contact-popup h3 {
    margin: 0 0 4px 0;
    font-size: 1.1rem;
    font-weight: 600;
    color: #e8e8e8;
    font-family: 'Playfair Display', serif;
    letter-spacing: 0.02em;
  }
  #contact-popup .subtitle {
    font-size: 0.75rem;
    color: rgba(255,255,255,0.35);
    margin-bottom: 16px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  #contact-popup a {
    display: block;
    padding: 12px 14px;
    margin-top: 8px;
    border-radius: 12px;
    text-decoration: none;
    font-size: 0.85rem;
    background: rgba(255, 255, 255, 0.04);
    color: rgba(255,255,255,0.8);
    border: 1px solid rgba(255,255,255,0.06);
    transition: all 0.3s ease;
    font-weight: 400;
  }
  #contact-popup a:hover {
    background: rgba(255, 255, 255, 0.1);
    border-color: rgba(255,255,255,0.15);
    color: #fff;
    transform: translateX(4px);
  }

  /* Info icon */
  .info-icon {
    font-size: 16px;
    color: rgba(192, 171, 225, 0.6);
    cursor: pointer;
    background: rgba(255, 255, 255, 0.04);
    padding: 10px 12px;
    border-radius: 10px;
    text-align: center;
    line-height: 16px;
    transition: all 0.3s ease;
    margin: 12px auto 0;
    display: block;
    width: 50%;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .info-icon:hover {
    background: rgba(255, 255, 255, 0.08);
    border-color: rgba(255,255,255,0.12);
    color: #c0abe1;
  }

  /* Shop button */
  #shop-btn {
    display: block;
    width: 100%;
    margin: 12px auto 0;
    padding: 12px;
    text-align: center;
    border-radius: 12px;
    background: linear-gradient(135deg, rgba(192,171,225,0.2), rgba(127,110,145,0.15));
    border: 1px solid rgba(192, 171, 225, 0.2);
    color: #c0abe1;
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s ease;
    letter-spacing: 0.03em;
  }
  #shop-btn:hover {
    background: linear-gradient(135deg, rgba(192,171,225,0.3), rgba(127,110,145,0.25));
    border-color: rgba(192, 171, 225, 0.4);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(192, 171, 225, 0.15);
  }

  /* Volume panel */
  #volume-panel {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 44px;
    height: 44px;
    padding: 0;
    overflow: hidden;
    position: relative;
    margin: 12px auto 0;
    background: rgba(255, 255, 255, 0.04);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  #volume-panel:hover {
    background: rgba(255, 255, 255, 0.07);
    border-color: rgba(255, 255, 255, 0.15);
  }
  #volume-panel.expanded {
    width: 160px;
    justify-content: space-between;
    padding: 0 12px;
    background: linear-gradient(90deg, rgba(192,171,225,0.15), rgba(127,110,145,0.1), rgba(192,171,225,0.15));
    background-size: 200% 100%;
    animation: wavy-water 10s linear infinite;
  }
  .volume-icon {
    width: 20px;
    height: 20px;
    cursor: pointer;
    position: relative;
    z-index: 10;
    filter: brightness(0.9);
    transition: filter 0.3s ease;
  }
  .volume-icon:hover { filter: brightness(1.2); }
  .volume-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 90px;
    height: 3px;
    background: rgba(255, 255, 255, 0.2);
    border-radius: 3px;
    outline: none;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.4s ease-in-out;
    position: absolute;
    right: 12px;
  }
  #volume-panel.expanded .volume-slider { opacity: 1; }
  .volume-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 14px;
    height: 14px;
    background: #c0abe1;
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(192, 171, 225, 0.4);
    transition: transform 0.2s ease;
  }
  .volume-slider::-webkit-slider-thumb:hover { transform: scale(1.2); }
  @keyframes wavy-water {
    0% { background-position: 100% 0; }
    100% { background-position: 0 0; }
  }

  /* ===== DISCLAIMER POPUP ===== */
  #disclaimer-popup {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    max-width: 340px;
    background: rgba(20, 20, 30, 0.85);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    color: rgba(255,255,255,0.8);
    padding: 28px 32px;
    border-radius: 20px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 25px 80px rgba(0,0,0,0.6);
    font-size: 0.85rem;
    z-index: 2000;
    text-align: center;
    line-height: 1.6;
    animation: popupIn 0.3s ease;
  }
  #disclaimer-popup button {
    background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
    color: white;
    border: 1px solid rgba(255,255,255,0.15);
    padding: 10px 24px;
    border-radius: 10px;
    margin-top: 16px;
    cursor: pointer;
    font-size: 0.8rem;
    font-weight: 500;
    transition: all 0.3s ease;
    letter-spacing: 0.03em;
  }
  #disclaimer-popup button:hover {
    background: linear-gradient(135deg, rgba(255,255,255,0.15), rgba(255,255,255,0.1));
    border-color: rgba(255,255,255,0.25);
    transform: translateY(-1px);
  }

  /* ===== SCROLLBAR ===== */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

  /* ===== LOADING SKELETON ===== */
  .skeleton {
    background: linear-gradient(90deg, 
      rgba(255,255,255,0.03) 0%, 
      rgba(255,255,255,0.06) 50%, 
      rgba(255,255,255,0.03) 100%);
    background-size: 200% 100%;
    animation: skeletonShine 1.5s ease-in-out infinite;
    border-radius: 20px;
  }
  @keyframes skeletonShine {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* ===== FADE UP ANIMATION ===== */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .animate-in {
    animation: fadeUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
  }
</style>

  <script async>
    let allImagePairs = [];
    const jsonPath = 'images.json';

    fetch(jsonPath)
      .then(response => {
        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
        return response.json();
      })
      .then(data => {
        if (data.length > 0) data.shift(); 
        allImagePairs = data;
        if (document.getElementById('gallery')) loadAllBatches();
      })
      .catch(error => console.error('Error fetching data:', error));
  </script>

  <div class="hero-slider">
    <img src="https://sahil-aditya.github.io/Creative_Gallery/images/slide1.png" alt="Creative Slide 1">
    <img src="https://sahil-aditya.github.io/Creative_Gallery/images/slide2.png" alt="Creative Slide 2">
    <img src="https://sahil-aditya.github.io/Creative_Gallery/images/slide3.png" alt="Creative Slide 3">
  </div>
</div>

<div id="gallery"></div>

<script>
  // --- MENU & POPUP LOGIC ---
  const menuBtn = document.getElementById('menu-btn');
  const contactPopup = document.getElementById('contact-popup');
  const phoneLink = document.getElementById('phone-link');
  const volumePanel = document.getElementById('volume-panel');
  const shopBtn = document.getElementById('shop-btn');

  menuBtn.addEventListener('click', (e) => {
    e.stopPropagation(); 
    contactPopup.style.display = (contactPopup.style.display === "block") ? "none" : "block";
  });

  document.addEventListener('click', (e) => {
    if (contactPopup.style.display === "block" && !contactPopup.contains(e.target) && !menuBtn.contains(e.target)) {
      contactPopup.style.display = "none";
    }
  });

  function showDisclaimer() {
    contactPopup.style.display = 'none';
    document.getElementById('disclaimer-popup').style.display = 'block';
  }
  function closeDisclaimer() {
    document.getElementById('disclaimer-popup').style.display = 'none';
  }

  window.addEventListener('scroll', () => {
    menuBtn.style.opacity = (window.scrollY > 100) ? '0' : '1';
    menuBtn.style.pointerEvents = (window.scrollY > 100) ? 'none' : 'auto';
  });

  shopBtn.addEventListener('click', () => { window.location.href = "shop.html"; });

  // --- VOLUME LOGIC ---
  let audio = null;
  const musicSource = "https://sahil-aditya.github.io/Creative_Gallery/images/music.mp3";
  const volumeSlider = document.getElementById('volume-slider');
  const volumeIcon = document.getElementById('volume-icon');
  let hasInteracted = false;
  let isExpanded = false;

  function initializeAudio() {
    if (!audio) { audio = new Audio(musicSource); audio.loop = true; audio.volume = 0; }
  }

  volumeSlider.addEventListener('input', () => {
    if (isExpanded) {
      const newVolume = parseFloat(volumeSlider.value);
      audio.volume = newVolume;
      volumeIcon.src = newVolume > 0 ? 'https://sahil-aditya.github.io/Creative_Gallery/images/play.png' : 'https://sahil-aditya.github.io/Creative_Gallery/images/mute.png';
      if (newVolume > 0 && audio.paused) audio.play();
    }
  });

  volumeIcon.addEventListener('click', (e) => {
    e.stopPropagation();
    initializeAudio();
    isExpanded = !isExpanded;
    volumePanel.classList.toggle('expanded', isExpanded);

    if (!hasInteracted) {
      audio.volume = 0.5; volumeSlider.value = 0.5;
      volumeIcon.src = 'https://sahil-aditya.github.io/Creative_Gallery/images/play.png';
      audio.play(); hasInteracted = true;
    } else {
      if (audio.volume > 0) {
        audio.volume = 0; volumeSlider.value = 0;
        volumeIcon.src = 'https://sahil-aditya.github.io/Creative_Gallery/images/mute.png';
        audio.pause();
      } else {
        audio.volume = 0.5; volumeSlider.value = 0.5;
        volumeIcon.src = 'https://sahil-aditya.github.io/Creative_Gallery/images/play.png';
        audio.play();
      }
    }
  });

  // --- BATCH LOADING & SLIDER LOGIC ---
  const gallery = document.getElementById("gallery");
  const batchSize = 2;
  let currentBatch = 0;
  let loadedCount = 0;

  function createSlider(pair, index) {
    const card = document.createElement("div");
    card.classList.add("slider-card", "glass");
    card.style.animationDelay = (index % 2) * 0.15 + "s";
    card.classList.add("animate-in");

    // Label bar
    const labelBar = document.createElement("div");
    labelBar.classList.add("card-label-bar");
    labelBar.innerHTML = `
      <span class="label-text">Before / After</span>
      <span class="label-badge">Color Grade</span>
    `;
    card.appendChild(labelBar);

    const afterImg = document.createElement("img");
    afterImg.src = pair.after;
    afterImg.classList.add("after-img", "blurred");
    afterImg.alt = "After color grading";

    const beforeImg = document.createElement("img");
    beforeImg.src = pair.before;
    beforeImg.classList.add("before-img", "blurred");
    beforeImg.alt = "Before color grading";

    card.appendChild(afterImg);
    card.appendChild(beforeImg);

    const handle = document.createElement("div");
    handle.classList.add("handle");
    card.appendChild(handle);

    // Footer - only index number, no "Color Graded" text
    const footer = document.createElement("div");
    footer.classList.add("card-footer");
    footer.innerHTML = `
      <span class="card-index">#${String(index + 1).padStart(2, '0')}</span>
    `;
    card.appendChild(footer);

    gallery.appendChild(card);

    afterImg.onload = () => afterImg.classList.remove("blurred");
    beforeImg.onload = () => beforeImg.classList.remove("blurred");

    let dragging = false;
    const move = (x) => {
      const rect = card.getBoundingClientRect();
      let offsetX = Math.max(0, Math.min(x - rect.left, rect.width));
      const percent = (offsetX / rect.width) * 100;
      beforeImg.style.clipPath = `inset(0 ${100 - percent}% 0 0)`;
      handle.style.left = `${percent}%`;
    };

    handle.addEventListener("mousedown", () => dragging = true);
    window.addEventListener("mouseup", () => dragging = false);
    window.addEventListener("mousemove", e => { if (dragging) move(e.clientX); });
    handle.addEventListener("touchstart", () => dragging = true);
    window.addEventListener("touchend", () => dragging = false);
    window.addEventListener("touchmove", e => { if (dragging) move(e.touches[0].clientX); });
  }

  function loadAllBatches() {
    let startIndex = currentBatch * batchSize;
    let endIndex = startIndex + batchSize;
    for (let i = startIndex; i < endIndex && i < allImagePairs.length; i++) {
      createSlider(allImagePairs[i], loadedCount);
      loadedCount++;
    }
    currentBatch++;
    if (startIndex + batchSize < allImagePairs.length) {
      setTimeout(loadAllBatches, 500);
    }
  }

  // --- FOCUS EFFECT ---
  let isUpdatingFocus = false;
  function updateFocus() {
    isUpdatingFocus = false;
    const windowHeight = window.innerHeight;
    const focusZoneStart = windowHeight * 0.25;
    const focusZoneEnd = windowHeight * 0.75;

    const cards = document.querySelectorAll('.slider-card');
    cards.forEach(card => {
      const rect = card.getBoundingClientRect();
      const elementCenter = rect.top + rect.height / 2;
      if (elementCenter > focusZoneStart && elementCenter < focusZoneEnd) {
        card.classList.add('in-focus');
      } else {
        card.classList.remove('in-focus');
      }
    });
  }

  window.addEventListener('scroll', () => {
    if (!isUpdatingFocus) {
      window.requestAnimationFrame(updateFocus);
      isUpdatingFocus = true;
    }
  });
  window.addEventListener('load', updateFocus);
</script>

</body>
</html>
