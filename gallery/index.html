<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | rollsbysam</title>
    
    <!-- Open Graph / Link Preview Meta Tags -->
    <meta property="og:title" content="Gallery | rollsbysam">
    <meta property="og:description" content="View the latest image gallery by rollsbysam.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://rollsbysam.vercel.app/gallery">
    <!-- IMPORTANT: Replace 'your-image.jpg' below with a real image path from your site for the preview thumbnail -->
    <meta property="og:image" content="https://rollsbysam.vercel.app/your-image.jpg">

    <!-- Twitter Card data -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Gallery | rollsbysam">
    <meta name="twitter:description" content="View the latest image gallery by rollsbysam.">
    <!-- IMPORTANT: Replace 'your-image.jpg' below with a real image path from your site for the preview thumbnail -->
    <meta name="twitter:image" content="https://rollsbysam.vercel.app/your-image.jpg">

    <!-- Aggressive Caching Meta Tags -->
    <meta http-equiv="Cache-Control" content="max-age=31536000, public">
    <meta http-equiv="Pragma" content="cache">
    <meta http-equiv="Expires" content="31536000">
    <style>
        /* General Reset */
        html {
            scroll-behavior: smooth;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            color: #000000;
            -webkit-overflow-scrolling: touch;
        }

        /* Custom Modern Sleek Tiny Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #ffffff;
        }
        ::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #999;
        }
        /* Firefox */
        * {
            scrollbar-width: thin;
            scrollbar-color: #ccc #ffffff;
        }

        /* Header Bar */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background-color: #ffffff;
            border-bottom: 1px solid #eaeaea;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: all 0.3s ease;
        }

        .back-button {
            position: absolute;
            left: 20px;
            text-decoration: none;
            color: #000000;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
        }

        .logo {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: lowercase;
        }

        /* Gallery Container */
        .gallery-container {
            margin-top: 80px;
            padding: 0 10px;
            transition: margin-top 0.3s ease;
        }

        /* EMBED STYLES: Applied automatically when in an iframe */
        body.is-embedded header {
            display: none !important;
        }
        body.is-embedded .gallery-container {
            margin-top: 10px !important;
        }
        /* Hide scrollbars specifically for embeds to look cleaner */
        body.is-embedded::-webkit-scrollbar {
            display: none; 
        }
        body.is-embedded {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }

        /* Masonry Layout using CSS Columns */
        .masonry {
            column-gap: 10px;
        }

        /* Responsive Columns */
        /* Mobile: 2 Columns */
        @media (max-width: 600px) {
            .masonry {
                column-count: 2;
            }
        }

        /* Tablet: 3 Columns */
        @media (min-width: 601px) and (max-width: 1024px) {
            .masonry {
                column-count: 3;
            }
        }

        /* Desktop: 4 Columns */
        @media (min-width: 1025px) {
            .masonry {
                column-count: 4;
            }
        }

        .masonry-item {
            display: inline-block;
            width: 100%;
            margin-bottom: 10px;
            background-color: #f9f9f9;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }

        .masonry-item img {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.3s ease;
        }

        .masonry-item:hover img {
            transform: scale(1.02);
        }

        .caption {
            padding: 8px;
            font-size: 12px;
            color: #666;
            text-align: center;
        }

        /* Modal for Enlarged Image */
        #modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.95);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            cursor: zoom-out;
        }

        #modal img {
            max-width: 90%;
            max-height: 90%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        #modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 30px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- Target "_top" ensures back button navigates the whole browser, not just the iframe -->
    <header>
        <a href="../index.html" class="back-button" target="_top">&larr;</a>
        <div class="logo">rollsbysam</div>
    </header>

    <div class="gallery-container">
        <div class="masonry" id="gallery">
            <!-- Images will be loaded here via JavaScript -->
        </div>
    </div>

    <div id="modal">
        <span id="modal-close">&times;</span>
        <img id="modal-img" src="" alt="Enlarged View">
    </div>

    <!-- Script to detect if the page is embedded in an iframe -->
    <script>
        if (window.self !== window.top) {
            document.body.classList.add('is-embedded');
        }
    </script>

    <script src="../gallery.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('../sw.js')
                    .then(reg => console.log('Service Worker registered'))
                    .catch(err => console.log('Service Worker registration failed', err));
            });
        }
    </script>
</body>
</html>
