<!DOCTYPE html>
<html lang="en">
<head>
    <!-- ===== DOCUMENT METADATA ===== -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- PAGE TITLE: Displayed in browser tab and search results -->
    <title>Gallery | rollsbysam</title>
    
    <!-- ===== SOCIAL MEDIA PREVIEW TAGS (Open Graph) ===== -->
    <meta property="og:title" content="Gallery | rollsbysam">
    <meta property="og:description" content="View the latest image gallery by rollsbysam.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://sahil-aditya.github.io/rollsbysam/gallery">
    <meta property="og:image" content="https://rollsbysam.vercel.app/your-image.jpg">

    <!-- ===== TWITTER CARD TAGS ===== -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Gallery | rollsbysam">
    <meta name="twitter:description" content="View the latest image gallery by rollsbysam.">
    <meta name="twitter:image" content="https://rollsbysam.vercel.app/your-image.jpg">

    <!-- ===== CACHING HEADERS ===== -->
    <meta http-equiv="Cache-Control" content="max-age=31536000, public">
    <meta http-equiv="Pragma" content="cache">
    <meta http-equiv="Expires" content="31536000">
    
    <!-- ===== GOOGLE FONTS ===== -->
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&display=swap" rel="stylesheet">

    <style>
        /* ===== GENERAL RESET & BASE STYLES ===== */
        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            font-family: "Bricolage Grotesque", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ececec;
            color: #000000;
            -webkit-overflow-scrolling: touch;
        }

        /* ===== CUSTOM SCROLLBAR STYLING ===== */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #ececec;
        }
        ::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #999;
        }
        * {
            scrollbar-width: thin;
            scrollbar-color: #ccc #ececec;
        }

        /* ===== HEADER BAR STYLES ===== */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background-color: #ececec;
            border-bottom: 1px solid #d0d0d0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: all 0.3s ease;
        }

        .back-button {
            position: absolute;
            left: 20px;
            text-decoration: none;
            color: #000000;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.3s ease;
        }

        .back-button:hover {
            opacity: 0.7;
        }

        .logo {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: lowercase;
        }

        /* ===== EMBED MODE STYLES ===== */
        body.is-embedded header {
            display: none !important;
        }
        body.is-embedded .gallery-container {
            margin-top: 0 !important;
            padding-top: 20px;
        }
        body.is-embedded::-webkit-scrollbar {
            display: none;
        }
        body.is-embedded {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* ===== GALLERY CONTAINER ===== */
        .gallery-container {
            margin-top: 80px;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: margin-top 0.3s ease;
        }

        /* ===== CAROUSEL STYLES ===== */
        .carousel-wrapper {
            width: 100%;
            max-width: 600px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }

        .carousel-controls {
            display: flex;
            gap: 12px;
        }

        .carousel-button {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 2px solid #000;
            background: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .carousel-button:hover {
            background: #000;
            color: white;
            transform: scale(1.05);
        }

        .carousel-button:active {
            transform: scale(0.95);
        }

        .carousel-button svg {
            width: 20px;
            height: 20px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
        }

        /* ===== CAROUSEL CONTENT ===== */
        .carousel-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .image-container {
            width: 100%;
            aspect-ratio: 1;
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            background: #f0f0f0;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .image-title {
            margin-top: 20px;
            font-size: 18px;
            font-weight: 500;
            text-align: center;
            text-transform: capitalize;
            letter-spacing: 0.5px;
            min-height: 28px;
        }

        .image-counter {
            margin-top: 12px;
            font-size: 14px;
            color: #888;
            text-align: center;
        }

        /* ===== MASONRY FALLBACK (hidden by default) ===== */
        .masonry {
            display: none;
        }

        /* ===== LOADING STATE ===== */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 500px;
            font-size: 16px;
            color: #888;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #f0f0f0;
            border-top: 3px solid #000;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ===== RESPONSIVE STYLES ===== */
        @media (max-width: 768px) {
            .carousel-wrapper {
                flex-direction: column;
                max-width: 100%;
                padding: 0 10px;
            }

            .carousel-controls {
                width: 100%;
                justify-content: center;
                order: 2;
                margin-top: 16px;
            }

            .carousel-content {
                order: 1;
            }

            .image-container {
                width: 100%;
                max-width: 400px;
            }

            .image-title {
                font-size: 16px;
            }
        }

        @media (max-width: 480px) {
            .gallery-container {
                padding: 20px 10px;
            }

            .image-container {
                aspect-ratio: 3/4;
            }

            .carousel-button {
                width: 40px;
                height: 40px;
            }

            .image-title {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <!-- ===== PAGE HEADER ===== -->
    <header>
        <a href="../index.html" class="back-button" id="back-button">&larr;</a>
        <div class="logo">rollsbysam</div>
    </header>

    <!-- ===== GALLERY CONTAINER ===== -->
    <div class="gallery-container">
        <div class="carousel-wrapper">
            <!-- Left Control -->
            <div class="carousel-controls" id="left-controls">
                <button class="carousel-button" id="prev-btn" aria-label="Previous image">
                    <svg viewBox="0 0 24 24">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                </button>
            </div>

            <!-- Carousel Content -->
            <div class="carousel-content">
                <div class="image-container" id="image-container">
                    <img id="carousel-image" src="" alt="Gallery image" />
                </div>
                <div class="image-title" id="image-title"></div>
                <div class="image-counter" id="image-counter"></div>
            </div>

            <!-- Right Control -->
            <div class="carousel-controls" id="right-controls">
                <button class="carousel-button" id="next-btn" aria-label="Next image">
                    <svg viewBox="0 0 24 24">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Fallback masonry gallery (hidden by default) -->
        <div class="masonry" id="gallery"></div>
    </div>

    <!-- ===== EMBED DETECTION SCRIPT ===== -->
    <script>
        if (window.self !== window.top) {
            document.body.classList.add('is-embedded');
            const backButton = document.getElementById('back-button');
            if (backButton) {
                backButton.removeAttribute('href');
                backButton.style.pointerEvents = 'none';
                backButton.style.opacity = '0.5';
            }
        }
    </script>

    <!-- ===== CAROUSEL FUNCTIONALITY SCRIPT ===== -->
    <script>
        let galleryData = [];
        let currentIndex = 0;

        // Fetch images from JSON (same as gallery.js)
        fetch('../images.json')
            .then(response => response.json())
            .then(data => {
                // Filter out empty links
                galleryData = data.filter(item => item.link && item.link.trim() !== "");
                
                if (galleryData.length === 0) {
                    document.getElementById('image-container').innerHTML = '<div class="loading">No images found</div>';
                    return;
                }

                // Initialize carousel
                updateCarousel();
                setupEventListeners();
            })
            .catch(error => {
                console.error('Error loading gallery images:', error);
                document.getElementById('image-container').innerHTML = '<div class="loading">Error loading images</div>';
            });

        function updateCarousel() {
            if (galleryData.length === 0) return;

            const item = galleryData[currentIndex];
            const img = document.getElementById('carousel-image');
            
            // Set image source
            img.src = '../' + item.link;
            img.alt = item.caption || 'Gallery image';

            // Update title
            const title = document.getElementById('image-title');
            if (item.caption && item.caption !== "Your text here") {
                title.textContent = item.caption;
            } else {
                title.textContent = '';
            }

            // Update counter
            document.getElementById('image-counter').textContent = 
                `${currentIndex + 1} / ${galleryData.length}`;
        }

        function setupEventListeners() {
            document.getElementById('prev-btn').addEventListener('click', () => {
                currentIndex = (currentIndex - 1 + galleryData.length) % galleryData.length;
                updateCarousel();
            });

            document.getElementById('next-btn').addEventListener('click', () => {
                currentIndex = (currentIndex + 1) % galleryData.length;
                updateCarousel();
            });

            // Keyboard navigation
            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowLeft') {
                    currentIndex = (currentIndex - 1 + galleryData.length) % galleryData.length;
                    updateCarousel();
                } else if (e.key === 'ArrowRight') {
                    currentIndex = (currentIndex + 1) % galleryData.length;
                    updateCarousel();
                }
            });
        }
    </script>

    <!-- ===== SERVICE WORKER REGISTRATION ===== -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('../sw.js')
                    .then(reg => console.log('Service Worker registered'))
                    .catch(err => console.log('Service Worker registration failed', err));
            });
        }
    </script>
</body>
</html>
