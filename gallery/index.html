<!DOCTYPE html>

<html lang="en"><head>
<!-- ===== DOCUMENT METADATA ===== -->
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<!-- PAGE TITLE -->
<title>Gallery | rollsbysam</title>
<!-- GOOGLE FONTS -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&amp;display=swap" rel="stylesheet"/>
<!-- MATERIAL SYMBOLS FOR ICONS -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
<!-- TAILWIND CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Bricolage Grotesque', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            bg: '#ececec',
                        }
                    }
                }
            }
        }
    </script>
<style>
        /* ===== GENERAL BASE STYLES ===== */
        body {
            background-color: #ececec;
            color: #000000;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ===== SLIDER ANIMATIONS ===== */
        .slider-container {
            perspective: 1000px;
        }

        .slide {
            transition: all 0.6s cubic-bezier(0.22, 1, 0.36, 1);
            opacity: 0;
            transform: translateX(100%) scale(0.9);
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .slide.active {
            opacity: 1;
            transform: translateX(0) scale(1);
            z-index: 10;
        }

        .slide.prev {
            opacity: 0;
            transform: translateX(-100%) scale(0.9);
            z-index: 5;
        }

        .slide.next {
            opacity: 0;
            transform: translateX(100%) scale(0.9);
            z-index: 5;
        }

        /* Image hover effect */
        .slide img {
            max-width: 90vw;
            max-height: 70vh;
            object-fit: contain;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border-radius: 12px;
            background: #fff;
        }

        /* Navigation Buttons */
        .nav-btn {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
            transition: all 0.2s ease;
        }
        .nav-btn:hover {
            background: #ffffff;
            transform: scale(1.1);
        }

        /* Hide scrollbars */
        ::-webkit-scrollbar { display: none; }
        * { scrollbar-width: none; }
    </style>
</head>
<body class="font-sans">
<!-- ===== PAGE HEADER ===== -->
<header class="fixed top-0 left-0 w-full h-16 bg-[#ececec]/80 backdrop-blur-md border-b border-black/5 flex items-center justify-center z-[1000]">
<a class="absolute left-6 text-2xl font-bold transition-transform hover:-translate-x-1" href="../index.html" id="back-button">
<span class="material-symbols-outlined">arrow_back</span>
</a>
<div class="text-lg font-semibold tracking-tight lowercase">rollsbysam</div>
</header>
<!-- ===== SLIDER UI ===== -->
<main class="relative w-full h-screen flex flex-col items-center justify-center pt-16">
<!-- Main Image Stage -->
<div class="relative w-full max-w-5xl h-[70vh] slider-container px-4 overflow-hidden" id="slider-stage">
<!-- Slides will be injected here -->
<div class="absolute inset-0 flex items-center justify-center text-black/40" id="loading-state">
<span class="material-symbols-outlined animate-spin mr-2">progress_activity</span>
                Loading Gallery...
            </div>
</div>
<!-- Pagination Counter -->
<div class="mt-8 text-sm font-medium tracking-widest uppercase opacity-40" id="counter">
            0 / 0
        </div>
<!-- Controls -->
<div class="flex items-center gap-8 mt-12">
<button class="nav-btn w-14 h-14 rounded-full flex items-center justify-center border border-black/10" onclick="prevSlide()">
<span class="material-symbols-outlined">chevron_left</span>
</button>
<button class="nav-btn w-14 h-14 rounded-full flex items-center justify-center border border-black/10" onclick="nextSlide()">
<span class="material-symbols-outlined">chevron_right</span>
</button>
</div>
</main>
<!-- ===== SCRIPTS ===== -->
<script>
        // State Management
        let images = [];
        let currentIndex = 0;

        // Fetch Logic
        async function loadGallery() {
            try {
                // Fetching from the specified path
                const response = await fetch('../images.json');
                images = await response.json();
                
                if (images && images.length > 0) {
                    renderSlider();
                } else {
                    document.getElementById('loading-state').textContent = "No images found.";
                }
            } catch (error) {
                console.error("Error loading gallery data:", error);
                // Fallback for demo/development if JSON missing
                document.getElementById('loading-state').textContent = "Failed to load images.";
            }
        }

        function renderSlider() {
            const stage = document.getElementById('slider-stage');
            stage.innerHTML = ''; // Clear loading state

            images.forEach((imgData, index) => {
                const slide = document.createElement('div');
                slide.className = `slide ${index === 0 ? 'active' : ''}`;
                slide.id = `slide-${index}`;
                
                const img = document.createElement('img');
                img.src = imgData.url;
                img.alt = imgData.caption || `Image ${index + 1}`;
                img.loading = 'lazy';
                
                slide.appendChild(img);
                stage.appendChild(slide);
            });

            updateCounter();
        }

        function updateCounter() {
            document.getElementById('counter').innerText = `${currentIndex + 1} / ${images.length}`;
        }

        function showSlide(index) {
            const allSlides = document.querySelectorAll('.slide');
            allSlides.forEach(slide => {
                slide.classList.remove('active', 'prev', 'next');
            });

            currentIndex = (index + images.length) % images.length;
            
            const current = document.getElementById(`slide-${currentIndex}`);
            const prev = document.getElementById(`slide-${(currentIndex - 1 + images.length) % images.length}`);
            const next = document.getElementById(`slide-${(currentIndex + 1) % images.length}`);

            if (current) current.classList.add('active');
            if (prev) prev.classList.add('prev');
            if (next) next.classList.add('next');

            updateCounter();
        }

        function nextSlide() {
            showSlide(currentIndex + 1);
        }

        function prevSlide() {
            showSlide(currentIndex - 1);
        }

        // Keyboard Support
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') nextSlide();
            if (e.key === 'ArrowLeft') prevSlide();
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadGallery();

            // Embed Check
            if (window.self !== window.top) {
                document.body.classList.add('is-embedded');
                const backButton = document.getElementById('back-button');
                if (backButton) {
                    backButton.style.display = 'none';
                }
            }
        });
    </script>
<!-- SERVICE WORKER -->
<script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('../sw.js')
                    .then(reg => console.log('Service Worker registered'))
                    .catch(err => console.log('Service Worker registration failed', err));
            });
        }
    </script>
</body></html>
