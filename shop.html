<!DOCTYPE html>
<html lang="en">
<head>

  'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
  })(window,document,'script','dataLayer','GTM-WWR2K6DG');</script>
  <meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Shop</title>
<style>
  body {
    background-color: #111;
    color: white;
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 20px;
    overflow-x: hidden;
  }

  /* --- Heading Container for Alignment --- */
  .heading-container {
    text-align: center;
    padding-top: 10px;
    margin-left: 20px;
  }

  /* Title */
  h1 {
    text-align: center;
    margin-bottom: 5px;
    background: linear-gradient(90deg, #c7c9c9, #bcc7cc, #c7c9c9);
    background-size: 200% 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: water-flow 8s linear infinite;
    text-shadow: 0 0 5px rgba(74, 140, 209, 0.5), 0 0 10px rgba(74, 140, 209, 0.3);
    font-size: clamp(1.2rem, 2.5vw, 1.5rem);
    letter-spacing: 1px;
    opacity: 0;
    transform: translateY(10px);
    animation: fadeUp 1s ease forwards;
    margin-top: 0;
  }
  h3 {
    text-align: center;
    background: linear-gradient(90deg, #adadad, #777778, #adadad);
    background-size: 200% 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: water-flow 8s linear infinite;
    text-shadow: 0 0 5px rgba(255, 255, 255, 0.5), 0 0 10px rgba(255, 255, 255, 0.3);
    font-weight: normal;
    margin-top: 8px;
    font-size: clamp(0.8rem, 1.5vw, 1rem);
    opacity: 0;
    transform: translateY(10px);
    animation: fadeUp 1s ease forwards;
    animation-delay: 0.2s;
  }

  @keyframes fadeUp {
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
  @keyframes water-flow {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .control-btn {
    position: fixed;
    top: 20px;
    border: none;
    cursor: pointer;
    border-radius: 8px;
    z-index: 9999;
    transition: opacity 0.3s ease, transform 0.3s ease, box-shadow 0.3s ease;
    color: white;
    font-size: 12px;
  }
  #menu-btn {
    left: 20px;
    background: linear-gradient(135deg, #1a232f, #2c3e50, #1a232f);
    background-size: 200% 200%;
    backdrop-filter: blur(10px);
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
    border: 1px solid rgba(255, 255, 255, 0.1);
    transition: all 0.3s ease;
    padding: 10px 12px;
  }
  #menu-btn:hover {
    animation: water-flow 8s linear infinite;
    transform: scale(1.05);
    box-shadow: 0 6px 12px rgba(0, 0, 0, 0.4);
  }
  #menu-btn div {
    width: 20px;
    height: 2px;
    background: white;
    margin: 4px 0;
  }

  /* Contact Popup */
  #contact-popup {
    position: fixed;
    top: 60px;
    left: 20px;
    color: white;
    border-radius: 10px;
    width: 250px;
    padding: 20px;
    z-index: 10000;
    background: rgba(17, 17, 17, 0.6);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(255, 255, 255, 0.15);
    box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
    display: none;
  }
  #contact-popup h3 {
    margin: 0;
    font-size: 16px;
    font-weight: bold;
  }
  #contact-popup p {
    margin: 4px 0 12px;
    font-size: 13px;
    color: #ccc;
  }
  #contact-popup a {
    display: block;
    padding: 10px;
    margin-top: 8px;
    border-radius: 6px;
    text-decoration: none;
    font-size: 14px;
    background: rgba(34, 34, 34, 0.7);
    color: white;
    transition: background 0.3s;
  }
  #contact-popup a:hover {
    background: rgba(51, 51, 51, 0.9);
  }
  .info-icon {
    font-size: 18px;
    color: #c0abe1;
    cursor: pointer;
    background: rgba(34, 34, 34, 0.7);
    padding: 10px 12px;
    border-radius: 6px;
    text-align: center;
    line-height: 18px;
    margin-top: 8px;
    transition: background 0.3s;
  }
  .info-icon:hover {
    background: rgba(51, 51, 51, 0.9);
  }

  /* Shop Grid Styling */
  .shop-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 40px;
    max-width: 1000px;
    margin: 60px auto;
    padding: 0 20px;
    justify-content: center;
  }
  .product-card {
    background: rgba(255, 255, 255, 0.05);
    border-radius: 12px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    cursor: pointer;
  }
  .product-card:hover {
    transform: translateY(-8px);
    box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
  }
  .thumbnail-container {
    width: 100%;
    padding-top: 100%;
    position: relative;
    overflow: hidden;
    border-radius: 12px 12px 0 0;
  }
  .product-thumbnail {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .product-info {
    padding: 15px;
  }
  .product-name {
    font-size: 1.2rem;
    font-weight: bold;
    margin: 0 0 5px;
  }
  .product-desc {
    font-size: 0.85rem;
    color: #bbb;
    margin: 0;
    min-height: 40px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .product-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 15px;
  }
  .product-price {
    font-size: 1rem;
    font-weight: bold;
    color: #28a745;
  }
  .buy-btn {
    background-color: #28a745;
    color: white;
    border: none;
    padding: 8px 15px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    transition: background-color 0.3s;
    text-decoration: none;
  }
  .buy-btn:hover {
    background-color: #218838;
  }

  /* Product Modal (Enlarged View) */
  .modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.9);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10001;
    display: none;
    backdrop-filter: blur(10px);
    padding: 20px;
    box-sizing: border-box;
  }
  
  .close-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    font-size: 28px;
    color: #fff;
    cursor: pointer;
    z-index: 10002;
  }
  
  .modal-content {
    background: #1c1c1c;
    border-radius: 10px;
    max-width: 800px;
    max-height: 90vh;
    overflow-y: auto;
    padding: 25px;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
  }
  
  .modal-image-container {
    width: 100%;
    max-width: 600px;
    padding-top: 100%;
    position: relative;
    text-align: center;
    margin-bottom: 20px;
    overflow: hidden;
    border-radius: 8px;
  }
  
  .modal-image {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
    animation: fadeIn 0.5s ease forwards;
    background-color: #333;
  }
  .modal-image.active {
    display: block;
  }
  .modal-nav-btn {
      display: none !important;
  }
  
  .modal-info {
    text-align: center;
    max-width: 90%;
    padding: 0 15px;
  }
  .modal-name {
    font-size: 1.8rem;
    font-weight: bold;
    margin: 10px 0 5px;
  }
  .modal-price-buy {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 15px;
    margin-bottom: 15px;
  }
  .modal-price {
    font-size: 1.5rem;
    font-weight: bold;
    color: #28a745;
  }
  .modal-desc {
    font-size: 0.9rem;
    color: #ccc;
    line-height: 1.5;
    white-space: pre-wrap;
    opacity: 0.8;
  }
  
  /* Dots for image navigation */
  .image-dots {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
    padding: 5px 10px;
    background: rgba(0, 0, 0, 0.5);
    border-radius: 10px;
    z-index: 200;
  }
  .dot {
    width: 10px;
    height: 10px;
    background-color: #555;
    border-radius: 50%;
    cursor: pointer;
    transition: background-color 0.3s;
  }
  .dot.active {
    background-color: #fff;
  }
  
  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }
</style>
</head>
<body>

<button id="menu-btn" class="control-btn">
  <div></div>
  <div></div>
  <div></div>
</button>

<div id="contact-popup">
  <h3>Get Your Photo Edited</h3>
  <p>Contact Us</p>
  <a href="https://www.instagram.com/sahil.aditya_" target="_blank">📩 DM on Instagram</a>
  <a href="mailto:sahilmaurya321@outlook.in">✉️ Send Email</a>
  <a id="phone-link" href="#" style="display:none;">📞 Call</a>
  <div class="info-icon">ⓘ</div>
</div>

<div class="heading-container">
    <h1>SamTouched Presets</h1>
    <h3>Colorist | sahil.aditya_</h3>
</div>

<div id="shop-grid" class="shop-grid"></div>

<div id="product-modal" class="modal-overlay">
  <span class="close-btn">&times;</span>
  <div class="modal-content">
    <div class="modal-image-container">
        <img src="" alt="Product Image" class="modal-image" id="modal-image">
        <div class="image-dots" id="image-dots"></div>
    </div>
    <div class="modal-info">
      <h2 class="modal-name" id="modal-name"></h2>
      <div class="modal-price-buy">
        <span class="modal-price" id="modal-price"></span>
        <a id="buy-link" href="#" target="_blank" class="buy-btn">Buy Now</a>
      </div>
      <p class="modal-desc" id="modal-desc"></p>
    </div>
  </div>
</div>

<script>
  const menuBtn = document.getElementById('menu-btn');
  const contactPopup = document.getElementById('contact-popup');
  const phoneLink = document.getElementById('phone-link');
  const infoIcon = document.querySelector('.info-icon');

  const phoneNumber = "";
  if (phoneNumber) {
    phoneLink.href = "tel:" + phoneNumber;
    phoneLink.style.display = "block";
  }

  menuBtn.addEventListener('click', () => {
    contactPopup.style.display = (contactPopup.style.display === "block") ? "none" : "block";
  });

  document.addEventListener('click', (e) => {
    if (!contactPopup.contains(e.target) && !menuBtn.contains(e.target)) {
      contactPopup.style.display = "none";
    }
  });

  const shopGrid = document.getElementById('shop-grid');
  const modal = document.getElementById('product-modal');
  const closeModalBtn = document.querySelector('.close-btn');
  const modalName = document.getElementById('modal-name');
  const modalPrice = document.getElementById('modal-price');
  const modalDesc = document.getElementById('modal-desc');
  const modalImage = document.getElementById('modal-image');
  const buyLink = document.getElementById('buy-link');
  const imageDotsContainer = document.getElementById('image-dots');
  const modalImageContainer = document.querySelector('.modal-image-container');

  let shopData = [];
  let currentProduct = null;
  let currentImageIndex = 0;
  let touchStartX = 0;

  fetch('shop.json')
    .then(response => {
      if (!response.ok) {
        throw new Error('Network response was not ok, status: ' + response.status);
      }
      return response.json();
    })
    .then(data => {
      shopData = data;
      renderProducts(shopData);
    })
    .catch(error => {
      console.error('Error fetching shop data:', error);
      shopGrid.innerHTML = `
        <div style="text-align: center; color: #aaa; margin-top: 50px;">
          <h2>Sorry! Products could not be loaded.</h2>
          <p>Please check your internet connection or try again later.</p>
        </div>
      `;
    });

  function renderProducts(products) {
    products.forEach(product => {
      const card = document.createElement('div');
      card.classList.add('product-card');
      
      card.innerHTML = `
        <div class="thumbnail-container">
            <img src="${product.thumbnail}" alt="${product.name}" class="product-thumbnail">
        </div>
        <div class="product-info">
          <h4 class="product-name">${product.name}</h4>
          <p class="product-desc">Loading...</p>
          <div class="product-footer">
            <span class="product-price">Loading...</span>
            <a class="buy-btn">Buy Now</a>
          </div>
        </div>
      `;
      
      const promises = [
        product.descriptionPath ? fetch(product.descriptionPath).then(res => res.text()).catch(() => 'No description available.') : Promise.resolve('No description available.'),
        product.price ? fetch(product.price).then(res => res.text()).catch(() => 'Price N/A') : Promise.resolve('Price N/A')
      ];

      Promise.all(promises).then(([descriptionText, priceText]) => {
        const firstLine = descriptionText.split('\n')[0].trim();
        card.querySelector('.product-desc').textContent = firstLine;
        card.querySelector('.product-price').textContent = priceText.trim();
      }).catch(error => {
        console.error(`Error fetching data for ${product.name}:`, error);
        card.querySelector('.product-desc').textContent = 'Error loading.';
        card.querySelector('.product-price').textContent = 'Error loading.';
      });

      card.addEventListener('click', () => showModal(product));
      shopGrid.appendChild(card);
    });
  }

  function showModal(product) {
    currentProduct = product;
    currentImageIndex = 0;
    
    modalName.textContent = product.name;
    
    const fetchPromises = [
      product.descriptionPath ? fetch(product.descriptionPath).then(res => res.text()).catch(() => 'Description not found.') : Promise.resolve('Description not found.'),
      product.price ? fetch(product.price).then(res => res.text()).catch(() => 'Price not found.') : Promise.resolve('Price not found.'),
    ];
    
    Promise.all(fetchPromises)
      .then(([descriptionText, priceText]) => {
        modalDesc.textContent = descriptionText;
        modalPrice.textContent = priceText.trim();
        
        if (product.buyLink) {
          buyLink.href = product.buyLink;
          buyLink.style.display = 'inline-block';
        } else {
          buyLink.href = '#';
          buyLink.style.display = 'none';
        }
      })
      .catch(error => {
        console.error('Error fetching product data:', error);
        modalDesc.textContent = 'Description not found.';
        modalPrice.textContent = 'Price not found.';
        buyLink.href = '#';
        buyLink.textContent = "Link N/A";
        buyLink.style.display = 'none';
      });
      
    updateModalImage();
    
    modal.style.display = 'flex';
  }

  function updateModalImage() {
    modalImage.src = currentProduct.images[currentImageIndex];
    modalImage.classList.remove('active');
    setTimeout(() => modalImage.classList.add('active'), 10);
    
    imageDotsContainer.innerHTML = '';
    if (currentProduct.images.length > 1) {
        imageDotsContainer.style.display = 'flex';
        currentProduct.images.forEach((_, index) => {
            const dot = document.createElement('span');
            dot.classList.add('dot');
            if (index === currentImageIndex) {
                dot.classList.add('active');
            }
            dot.addEventListener('click', (e) => {
                e.stopPropagation();
                currentImageIndex = index;
                updateModalImage();
            });
            imageDotsContainer.appendChild(dot);
        });
    } else {
        imageDotsContainer.style.display = 'none';
    }
  }
  
  closeModalBtn.addEventListener('click', () => {
    modal.style.display = 'none';
  });

  window.addEventListener('click', (e) => {
    if (e.target === modal) {
      modal.style.display = 'none';
    }
  });

  modalImageContainer.addEventListener('mousedown', (e) => {
      touchStartX = e.clientX;
  });

  modalImageContainer.addEventListener('mouseup', (e) => {
      const touchEndX = e.clientX;
      const threshold = 50;

      if (touchStartX - touchEndX > threshold) {
          currentImageIndex = (currentImageIndex + 1) % currentProduct.images.length;
          updateModalImage();
      } else if (touchEndX - touchStartX > threshold) {
          currentImageIndex = (currentImageIndex - 1 + currentProduct.images.length) % currentProduct.images.length;
          updateModalImage();
      }
  });

  modalImageContainer.addEventListener('touchstart', (e) => {
      touchStartX = e.touches[0].clientX;
  });

  modalImageContainer.addEventListener('touchend', (e) => {
      const touchEndX = e.changedTouches[0].clientX;
      const threshold = 50;

      if (touchStartX - touchEndX > threshold) {
          currentImageIndex = (currentImageIndex + 1) % currentProduct.images.length;
          updateModalImage();
      } else if (touchEndX - touchStartX > threshold) {
          currentImageIndex = (currentImageIndex - 1 + currentProduct.images.length) % currentProduct.images.length;
          updateModalImage();
      }
  });
</script>

</body>
</html>
