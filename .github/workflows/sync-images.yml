name: Custom Google Drive Sync

on:
  push:
    paths:
      - 'images/**'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Download Files and Update JSON
        env:
          GOOGLE_DRIVE_CREDENTIALS: ${{ secrets.GOOGLE_DRIVE_CREDENTIALS }}
          FOLDER_ID: 1XqT2oggvaYNpguTjBfjJMsUKzvYSyY5w
        run: |
          npm install googleapis fs path
          
          node -e '
            const { google } = require("googleapis");
            const fs = require("fs");
            const path = require("path");

            const credentials = JSON.parse(process.env.GOOGLE_DRIVE_CREDENTIALS);
            const folderId = process.env.FOLDER_ID;
            const destPath = "./images";
            const jsonFilePath = "./images.json";

            async function syncFiles() {
              console.log("Starting authentication...");
              const auth = new google.auth.GoogleAuth({
                credentials,
                scopes: ["https://www.googleapis.com/auth/drive.readonly"],
              });
              const drive = google.drive({ version: "v3", auth });
              console.log("Authentication successful.");

              if (!fs.existsSync(destPath)) {
                fs.mkdirSync(destPath);
                console.log("Created destination folder: " + destPath);
              }

              console.log(`Listing files in folder with ID: ${folderId}`);
              const res = await drive.files.list({
                q: `"${folderId}" in parents`,
                fields: "files(id, name)",
              });
              
              const files = res.data.files;
              console.log(`Found ${files.length} files in the folder.`);

              if (files.length > 0) {
                // Download files
                for (const file of files) {
                  console.log(`Downloading file: ${file.name}`);
                  const dest = fs.createWriteStream(path.join(destPath, file.name));
                  const fileRes = await drive.files.get(
                    { fileId: file.id, alt: "media" },
                    { responseType: "stream" }
                  );
                  await new Promise((resolve, reject) => {
                    fileRes.data
                      .on("end", () => resolve())
                      .on("error", (err) => {
                        console.error(`Error downloading file ${file.name}:`, err);
                        reject(err);
                      })
                      .pipe(dest);
                  });
                }

                // Update images.json
                console.log("Updating images.json...");
                const imageFileNames = fs.readdirSync(destPath).filter(name => !/^\..*/.test(name)); // Exclude hidden files
                const imagesJson = imageFileNames.map(fileName => ({
                  "name": fileName,
                  "path": `./images/${fileName}`
                }));

                fs.writeFileSync(jsonFilePath, JSON.stringify(imagesJson, null, 2));
                console.log("images.json updated.");
              } else {
                console.log("No new files to download or update in images.json.");
              }
            }

            syncFiles().catch(console.error);
          '

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: Sync images from Google Drive and update images.json" || true
          git push
          
