name: Sync Images from Google Drive

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash

      - name: Configure rclone with service account
        run: |
          echo '${{ secrets.GOOGLE_DRIVE_CREDENTIALS }}' > sa.json
          mkdir -p ~/.config/rclone
          printf "[gdrive]\n"
          printf "type = drive\n"
          printf "scope = drive\n"
          printf "service_account_file = %s/sa.json\n" "$(pwd)" > ~/.config/rclone/rclone.conf
          cat ~/.config/rclone/rclone.conf

      - name: Test connection
        run: rclone ls gdrive: --max-depth 1 -vv || true

      - name: Sync files from Google Drive
        run: |
          rclone copy gdrive: ./images \
            --drive-root-folder-id=1XqT2oggvaYNpguTjBfjJMsUKzvYSyY5w \
            --progress -vv
