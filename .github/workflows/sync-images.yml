name: Sync Images from Google Drive

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash

      - name: Configure rclone
        run: |
          echo "${{ secrets.GOOGLE_DRIVE_CREDENTIALS }}" > sa.json
          rclone config create gdrive drive \
            scope=drive \
            service_account_file=sa.json

      - name: Sync files from Google Drive
        run: |
          rclone copy gdrive:1XqT2oggvaYNpguTjBfjJMsUKzvYSyY5w ./images --drive-root-folder-id=1XqT2oggvaYNpguTjBfjJMsUKzvYSyY5w --progress

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: Sync images from Google Drive" || true
          git push
