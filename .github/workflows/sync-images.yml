name: Custom Google Drive Sync

on:
  workflow_dispatch:
  # schedule:
  #   - cron: '0 8 * * *' # Runs at 8:00 AM UTC every day

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Mirror Google Drive to GitHub
        env:
          GOOGLE_DRIVE_CREDENTIALS: ${{ secrets.GOOGLE_DRIVE_CREDENTIALS }}
          FOLDER_ID: 1XqT2oggvaYNpguTjBfjJMsUKzvYSyY5w
          GITHUB_REPO_URL: https://sahil-aditya.github.io/Creative_Gallery
        run: |
          npm install googleapis fs path
          
          node -e '
            const { google } = require("googleapis");
            const fs = require("fs");
            const path = require("path");

            const credentials = JSON.parse(process.env.GOOGLE_DRIVE_CREDENTIALS);
            const folderId = process.env.FOLDER_ID;
            const repoUrl = process.env.GITHUB_REPO_URL;
            const destPath = "./images";
            const jsonFilePath = "./images.json";

            async function syncFiles() {
              console.log("Starting authentication...");
              const auth = new google.auth.GoogleAuth({
                credentials,
                scopes: ["https://www.googleapis.com/auth/drive.readonly"],
              });
              const drive = google.drive({ version: "v3", auth });
              console.log("Authentication successful.");

              if (!fs.existsSync(destPath)) {
                fs.mkdirSync(destPath);
                console.log("Created destination folder: " + destPath);
              }

              console.log(`Listing files in Google Drive folder: ${folderId}`);
              const res = await drive.files.list({
                q: `"${folderId}" in parents`,
                fields: "files(id, name, modifiedTime)",
              });
              
              const driveFiles = res.data.files;
              console.log(`Found ${driveFiles.length} files in Google Drive.`);

              const githubFiles = fs.existsSync(destPath) ? fs.readdirSync(destPath).filter(name => !/^\..*/.test(name)) : [];

              // Delete files from GitHub that are not in Google Drive
              for (const fileName of githubFiles) {
                if (!driveFiles.some(f => f.name === fileName)) {
                  const filePath = path.join(destPath, fileName);
                  fs.unlinkSync(filePath);
                  console.log(`Deleted file from GitHub: ${fileName}`);
                }
              }

              // Download or update files from Google Drive
              for (const driveFile of driveFiles) {
                const filePath = path.join(destPath, driveFile.name);
                const isNew = !fs.existsSync(filePath);
                
                if (isNew) {
                  console.log(`Downloading new file: ${driveFile.name}`);
                } else {
                  console.log(`Updating existing file: ${driveFile.name}`);
                  fs.unlinkSync(filePath); // Delete the old version to ensure it is replaced
                }
                
                const dest = fs.createWriteStream(filePath);
                const fileRes = await drive.files.get(
                  { fileId: driveFile.id, alt: "media" },
                  { responseType: "stream" }
                );
                await new Promise((resolve, reject) => {
                  fileRes.data
                    .on("end", () => resolve())
                    .on("error", (err) => {
                      console.error(`Error downloading file ${driveFile.name}:`, err);
                      reject(err);
                    })
                    .pipe(dest);
                });
              }

              // Update images.json with the new format
              console.log("Updating images.json...");
              const allFileNames = fs.readdirSync(destPath).filter(name => !/^\..*/.test(name) && !name.includes("music"));
              const afterImages = allFileNames.filter(name => name.startsWith("after"));
              const beforeAfterPairs = [];

              for (const afterFile of afterImages) {
                const baseName = afterFile.replace("after", "before");
                if (allFileNames.includes(baseName)) {
                  beforeAfterPairs.push({
                    before: `${repoUrl}/images/${baseName}`,
                    after: `${repoUrl}/images/${afterFile}`
                  });
                }
              }

              fs.writeFileSync(jsonFilePath, JSON.stringify(beforeAfterPairs, null, 2));
              console.log("images.json updated with before/after pairs.");
            }

            syncFiles().catch(console.error);
          '

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: Mirror Google Drive and update images.json" || true
          git push
          
