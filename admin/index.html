<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sahil Aditya | Creative Gallery</title>
    
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    
    <link rel="stylesheet" href="style.css"> 
</head>
<body>

    <div id="gallery-container">
        <h1>My Creative Gallery</h1>
        </div>

    <script>
        if (window.netlifyIdentity) {
            // Jab user invite link se aaye ya login kare
            window.netlifyIdentity.on("init", user => {
                if (!user) {
                    window.netlifyIdentity.on("login", () => {
                        // Login ke baad seedha admin panel pe bhejo
                        document.location.href = "/admin/";
                    });
                }
            });

            // Isse logout hone par wapis home page par redirect hoga
            window.netlifyIdentity.on("logout", () => {
                document.location.href = "/";
            });
        }
    </script>

</body>
</html>
