backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "gallery"
    label: "Creative Gallery"
    folder: "images"
    extension: "json" # Isse error chala jayega
    format: "json"    # Ye mandatory property hai jo missing thi
    create: true
    fields:
      - {label: "Image", name: "image", widget: "image"}
      - {label: "Title", name: "title", widget: "string"}
      
