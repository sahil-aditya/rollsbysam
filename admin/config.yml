backend:
  name: git-gateway
  branch: main # or master

media_folder: "images"
public_folder: "/images"

collections:
  - name: "content"
    label: "Content"
    folder: "content"
    create: true
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Body", name: "body", widget: "markdown"}
      - {label: "Image", name: "image", widget: "image"}
      "}
