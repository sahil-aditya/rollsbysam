backend:
  name: git-gateway
  branch: main # or master, depending on your branch name

media_folder: "images" # Folder where uploaded images will be stored
public_folder: "/images" # Folder from which to access the images on the website

collections:
  - name: "blog"
    label: "Blog"
    folder: "_posts/blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Body", name: "body", widget: "markdown"}
      - {label: "Publish Date", name: "date", widget: "datetime"}
