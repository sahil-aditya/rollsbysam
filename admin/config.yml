backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  # 1. Gallery Collection (Sirf Images ke liye)
  - name: "gallery"
    label: "Images Folder"
    folder: "images"
    create: true
    extension: "json"
    format: "json"
    fields:
      - {label: "Image", name: "image", widget: "image"}
      - {label: "Title", name: "title", widget: "string"}

  # 2. Files Collection (Root ki files jaise index.html ke liye)
  - name: "pages"
    label: "Root Pages"
    files:
      - file: "index.html"
        label: "Main Index Page"
        name: "index"
        fields:
          - {label: "Page Title", name: "title", widget: "string"}
          # Agar tujhe index ka content badalna hai toh yahan widgets add karne honge
          
